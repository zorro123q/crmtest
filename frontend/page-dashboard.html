<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>销售仪表盘 — SalesPilot CRM</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
:root{--primary:#0EA5E9;--primary-dark:#0284C7;--primary-light:#E0F2FE;--accent:#8B5CF6;--success:#10B981;--warning:#F59E0B;--danger:#EF4444;--bg:#F1F5F9;--surface:#FFFFFF;--surface2:#F8FAFC;--border:#E2E8F0;--text:#1E293B;--text2:#64748B;--text3:#94A3B8;--shadow:0 1px 3px rgba(15,23,42,0.08),0 4px 12px rgba(15,23,42,0.04);--shadow-lg:0 10px 25px rgba(15,23,42,0.15);--radius:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;background:linear-gradient(180deg,#0F172A 0%,#1E3A5F 50%,#0F172A 100%);color:#CBD5E1;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;position:relative}
.sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:200px;background:radial-gradient(ellipse at top left,rgba(14,165,233,.15) 0%,transparent 50%);pointer-events:none}
.logo{padding:24px 20px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.06)}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#0EA5E9,#6366F1);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 12px rgba(14,165,233,.4)}
.logo-text{font-size:18px;font-weight:700;background:linear-gradient(135deg,#fff,#0EA5E9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:10px;color:#64748B;margin-top:2px}
.nav-section{padding:16px 0 8px}
.nav-label{font-size:10px;font-weight:600;color:#475569;letter-spacing:1px;text-transform:uppercase;padding:0 20px 6px}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;font-size:14px;border-left:3px solid transparent;transition:all .2s ease;position:relative;color:#94A3B8;pointer-events:all;z-index:10;text-decoration:none}
.nav-item:hover{background:rgba(14,165,233,.08);color:#E2E8F0}
.nav-item.active{background:linear-gradient(90deg,rgba(14,165,233,.15) 0%,transparent 100%);color:#fff;font-weight:600;border-left-color:#0EA5E9}
.nav-item .icon{font-size:18px;width:22px;text-align:center}
.nav-badge{margin-left:auto;background:linear-gradient(135deg,#0EA5E9,#6366F1);color:#fff;font-size:10px;border-radius:12px;padding:2px 8px;font-weight:700}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:linear-gradient(145deg,#FFFFFF,#F8FAFC);border-bottom:1px solid var(--border);padding:0 28px;height:64px;display:flex;align-items:center;gap:20px;flex-shrink:0;box-shadow:0 1px 3px rgba(15,23,42,.05)}
.topbar-title{font-size:20px;font-weight:700;color:var(--text);flex:1;letter-spacing:-.3px}
.topbar-sub{font-size:13px;color:var(--text3);font-weight:400;margin-left:10px}
.search-box{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px 14px;gap:8px;width:260px;transition:all .2s}
.search-box:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px rgba(14,165,233,.1)}
.search-box input{border:none;background:none;outline:none;font-size:13px;color:var(--text);width:100%}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s ease}
.btn-primary{background:linear-gradient(135deg,#0EA5E9,#6366F1);color:#fff;box-shadow:0 4px 12px rgba(14,165,233,.3)}
.btn-primary:hover{background:linear-gradient(135deg,#0284C7,#7C3AED);transform:translateY(-2px)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.avatar{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#0EA5E9,#6366F1);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.content{flex:1;overflow-y:auto;padding:24px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:28px}
.kpi-card{background:var(--surface);border-radius:16px;padding:24px;box-shadow:var(--shadow);position:relative;overflow:hidden;border:1px solid var(--border);transition:all .3s ease}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#0EA5E9,#6366F1)}
.kpi-card::after{content:'';position:absolute;right:-20px;top:-20px;width:100px;height:100px;border-radius:50%;opacity:.05}
.kpi-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.kpi-card.blue::after{background:var(--primary)}.kpi-card.green::after{background:var(--success)}.kpi-card.orange::after{background:var(--accent)}.kpi-card.purple::after{background:#8B5CF6}
.kpi-label{font-size:13px;color:var(--text2);font-weight:500;margin-bottom:12px}
.kpi-value{font-size:32px;font-weight:800;color:var(--text);line-height:1}
.kpi-value.blue{color:var(--primary)}.kpi-value.green{color:var(--success)}.kpi-value.orange{color:var(--accent)}.kpi-value.purple{color:#8B5CF6}
.kpi-trend{font-size:13px;margin-top:12px;display:flex;align-items:center;gap:6px}
.trend-up{color:var(--success)}.trend-down{color:var(--danger)}
.charts-row{display:grid;grid-template-columns:1fr 1.6fr;gap:20px;margin-bottom:28px}
.chart-card{background:var(--surface);border-radius:16px;padding:24px;box-shadow:var(--shadow);border:1px solid var(--border)}
.chart-title{font-size:16px;font-weight:700;margin-bottom:6px}
.chart-sub{font-size:13px;color:var(--text3);margin-bottom:20px}
.activity-list{display:flex;flex-direction:column;gap:12px;max-height:320px;overflow-y:auto}
.activity-item{display:flex;gap:12px;padding:10px;background:var(--bg);border-radius:8px}
.activity-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:5px}
.activity-text{font-size:13px;line-height:1.5}
.activity-time{font-size:11px;color:var(--text3);margin-top:2px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:15px;font-weight:700}
@media(max-width:1200px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.charts-row{grid-template-columns:1fr}}
@media(max-width:768px){.sidebar{display:none}.kpi-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- 左侧导航 -->

    <div class="logo-icon">🚀</div>
    <div>
      <div class="logo-text">SalesPilot</div>

  <div class="nav-section">
    <div class="nav-label">AI 能力</div>
    <a class="nav-item" href="ai-input.html"><span class="icon">🤖</span>AI 智能录入</a>
    <a class="nav-item" href="card-input.html"><span class="icon">🎯</span>价值评估</a>
  </div>
  <div class="nav-section">
    <div class="nav-label">配置</div>
    <a class="nav-item" href="page-metadata.html"><span class="icon">⚙️</span>元数据配置</a>

</div>

<!-- 主内容区 -->
<div class="main">

  <div class="content">

    <div class="charts-row">

      <div class="chart-card">
        <div class="chart-title">月度业绩趋势</div><div class="chart-sub">赢单金额 & 管道增量（万元）</div>
        <div id="trendChart" style="height:280px"></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:16px">
      <div class="chart-card">
        <div class="section-header"><div class="section-title">近期活动</div><button class="btn btn-ghost" style="font-size:12px;padding:4px 10px">查看全部</button></div>

      </div>
      <div class="chart-card">
        <div class="chart-title">销售员业绩排行</div><div class="chart-sub">本月赢单金额（万元）</div>
        <div id="rankChart" style="height:240px"></div>
      </div>
    </div>
  </div>
</div>

<script>

var opps = [
  {id:1,company:'北京保险集团',name:'智能客服升级',amount:280,stage:'方案认可',owner:'张三',type:'老客户',probability:75,createTime:'2026-01-10'},
  {id:2,company:'上海物流公司',name:'呼叫中心建设',amount:150,stage:'有效接触',owner:'李四',type:'新客户',probability:30,createTime:'2026-02-15'},
  {id:3,company:'深圳科技集团',name:'AI质检部署',amount:420,stage:'签约回款',owner:'王五',type:'老客户',probability:95,createTime:'2026-01-20'},
  {id:4,company:'广州零售连锁',name:'会员营销系统',amount:85,stage:'收集信息',owner:'赵六',type:'新客户',probability:10,createTime:'2026-03-08'},

  {id:9,company:'北京保险集团',name:'催收机器人',amount:95,stage:'签约回款',owner:'张三',type:'老客户',probability:90,createTime:'2026-02-05'},

// 漏斗数据
var funnelData = [
  {stage:'收集信息',value:156,color:'#0EA5E9'},
  {stage:'有效接触',value:98,color:'#6366F1'},
  {stage:'拿到预算',value:65,color:'#8B5CF6'},

];

// 渲染迷你漏斗
function renderFunnelMini() {
  var chart = echarts.init(document.getElementById('funnelMini'));
  var option = {
    tooltip:{trigger:'item',formatter:'{b}: {c}'},
    series:[{
      type:'funnel',
      left:'10%',top:'10%',bottom:'10%',width:'80%',
      label:{show:true,position:'inside',formatter:'{b}\n{c}',fontSize:12},
      itemStyle:{borderWidth:0},
      data:funnelData
    }]
  };
  chart.setOption(option);
}

// 渲染趋势图
function renderTrendChart() {
  var chart = echarts.init(document.getElementById('trendChart'));
  var option = {
    tooltip:{trigger:'axis'},
    legend:{data:['赢单金额','管道增量'],bottom:0},
    grid:{left:'3%',right:'4%',bottom:'15%',top:'10%',containLabel:true},
    xAxis:{type:'category',data:['1月','2月','3月'],boundaryGap:false},
    yAxis:{type:'value',name:'万元'},

      {name:'赢单金额',type:'line',data:[320,450,280],smooth:true,itemStyle:{color:'#10B981'},areaStyle:{color:'rgba(16,185,129,0.1)'}},

  };

}

// 渲染排行
function renderRankChart() {
  var chart = echarts.init(document.getElementById('rankChart'));

    tooltip:{trigger:'axis',axisPointer:{type:'shadow'}},
    grid:{left:'3%',right:'10%',top:'5%',bottom:'10%',containLabel:true},
    xAxis:{type:'value'},
    yAxis:{type:'category',data:['赵六','李四','王五','张三'].reverse()},

      type:'bar',
      data:[85,120,165,198],
      itemStyle:{color:function(params){return['#94A3B8','#0EA5E9','#8B5CF6','#10B981'][params.dataIndex]}},
      barWidth:16,
      label:{show:true,position:'right',formatter:'{c}万'}
    }]
  };
  chart.setOption(option);
}

// 渲染活动列表

  }).join('');
  document.getElementById('activity-list').innerHTML = html;
}

// 初始化
renderFunnelMini();
renderTrendChart();
renderRankChart();
renderActivity();
</script>
