<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>位置打卡 - SalesPilot CRM</title>
<style>
:root{
  --primary:#0ea5e9;
  --primary-dark:#0284c7;
  --success:#10b981;
  --warning:#f59e0b;
  --danger:#ef4444;
  --bg:#f1f5f9;
  --surface:#ffffff;
  --border:#e2e8f0;
  --text:#1e293b;
  --text2:#64748b;
  --text3:#94a3b8;
  --shadow:0 1px 3px rgba(15,23,42,.08),0 10px 22px rgba(15,23,42,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
.sidebar{width:236px;background:linear-gradient(180deg,#0f172a 0%,#1e3a5f 55%,#0f172a 100%);color:#cbd5e1;padding:22px 0}
.logo{padding:0 20px 22px;border-bottom:1px solid rgba(255,255,255,.08)}
.logo-title{font-size:22px;font-weight:800;color:#fff}
.nav{padding:16px 12px 0}
.nav-section{margin-bottom:10px}
.nav-label{padding:0 12px 6px;font-size:10px;font-weight:700;color:#64748b;letter-spacing:1px;text-transform:uppercase}
.nav a{display:flex;align-items:center;gap:10px;color:#94a3b8;text-decoration:none;padding:11px 12px;border-radius:12px;font-size:14px;margin-bottom:6px}
.nav a:hover,.nav a.active{background:rgba(14,165,233,.14);color:#fff}
.main{flex:1;display:flex;flex-direction:column}
.topbar{background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:18px 24px;display:flex;justify-content:space-between;align-items:flex-start;gap:20px;position:sticky;top:0;z-index:10}
.topbar h1{font-size:24px;font-weight:800}
.topbar p{font-size:13px;color:var(--text2);margin-top:6px;line-height:1.7}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.btn{border:none;border-radius:12px;padding:10px 14px;font-size:14px;font-weight:700;cursor:pointer}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--primary),#2563eb);color:#fff}
.btn-success{background:linear-gradient(135deg,var(--success),#059669);color:#fff}
.btn-ghost{background:#fff;border:1px solid var(--border);color:var(--text)}
.avatar{width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,var(--primary),#2563eb);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800}
.content{padding:24px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:18px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:var(--shadow)}
.stat-label{font-size:12px;color:var(--text3)}
.stat-value{font-size:28px;font-weight:800;margin-top:8px}
.stat-hint{font-size:12px;color:var(--text2);margin-top:8px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);margin-bottom:20px}
.panel-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:16px;border-radius:20px 20px 0 0}
.panel-head h2{font-size:18px;font-weight:800}
.checkin-form{padding:20px}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:700;color:var(--text2);margin-bottom:8px}
.input,.select,.textarea{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:12px;font-size:14px;background:#fff}
.textarea{min-height:80px;resize:vertical;line-height:1.7}
.input:focus,.select:focus,.textarea:focus{outline:none;border-color:#7dd3fc;box-shadow:0 0 0 3px rgba(14,165,233,.12)}
.location-info{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:14px;margin-bottom:16px}
.location-info.success{background:#f0fdf4;border-color:#bbf7d0;color:#166534}
.location-info.error{background:#fef2f2;border-color:#fecaca;color:#991b1b}
.location-info.pending{background:#fffbeb;border-color:#fde68a;color:#92400e}
.location-status{font-size:13px;font-weight:700;margin-bottom:4px}
.location-detail{font-size:12px;color:var(--text2)}
.checkin-btn-wrap{display:flex;gap:12px;margin-top:20px}
.records-list{padding:16px}
.record-item{display:flex;align-items:flex-start;gap:14px;padding:14px;border-bottom:1px solid var(--border)}
.record-item:last-child{border-bottom:none}
.record-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--success),#059669);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.record-content{flex:1}
.record-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.record-title{font-size:14px;font-weight:700}
.record-time{font-size:12px;color:var(--text3)}
.record-meta{font-size:12px;color:var(--text2);line-height:1.6}
.record-remark{font-size:13px;color:var(--text);margin-top:6px;padding:8px 10px;background:#f8fafc;border-radius:8px}
.empty{padding:36px;text-align:center;color:var(--text2)}
.map-container{height:300px;border-radius:12px;overflow:hidden;margin-bottom:16px;background:#e2e8f0;position:relative}
.map-placeholder{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text2);font-size:14px}
@media (max-width:860px){
  body{display:block}
  .sidebar{width:100%;padding:14px}
  .nav{padding:16px 0 0}
  .topbar{position:static;flex-direction:column;align-items:flex-start}
  .stats,.form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="logo">
    <div class="logo-title">SalesPilot</div>
  </div>
  <nav class="nav">
    <div class="nav-section">
      <div class="nav-label">概览</div>
      <a href="crm-system.html">工作台</a>
      <a href="page-dashboard.html">销售仪表盘</a>
      <a href="page-funnel.html">商机漏斗</a>
    </div>
    <div class="nav-section">
      <div class="nav-label">销售管理</div>
      <a href="page-kanban.html">商机看板</a>
      <a href="page-leads.html">线索管理</a>
      <a href="page-opportunities.html">客户商机管理表</a>
      <a href="page-report.html">商机通报</a>
    </div>
    <div class="nav-section">
      <div class="nav-label">外勤管理</div>
      <a href="page-checkin.html" class="active">位置打卡</a>
    </div>
    <div class="nav-section">
      <div class="nav-label">AI 能力</div>
      <a href="ai-input.html">AI 智能录入</a>
      <a href="card-input.html">价值评估</a>
    </div>
    <div class="nav-section">
      <div class="nav-label">配置</div>
      <a href="page-metadata.html">元数据配置</a>
    </div>
  </nav>
</aside>

<main class="main">
  <div class="topbar">
    <div>
      <h1>位置打卡</h1>
      <p>外勤拜访客户时，确认位置并打卡记录。打卡记录将保存到数据库，可用于外勤统计和汇报。</p>
    </div>
    <div class="toolbar">
      <button class="btn btn-ghost" id="refresh-btn">刷新</button>
      <div class="avatar" id="user-avatar">U</div>
    </div>
  </div>

  <div class="content">
    <section class="stats">
      <div class="stat-card">
        <div class="stat-label">今日打卡</div>
        <div class="stat-value" id="stat-today">0</div>
        <div class="stat-hint">今日打卡次数</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">本周打卡</div>
        <div class="stat-value" id="stat-week">0</div>
        <div class="stat-hint">最近7天打卡次数</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">关联商机</div>
        <div class="stat-value" id="stat-opportunity">-</div>
        <div class="stat-hint">当前选择的商机</div>
      </div>
    </section>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <section class="panel">
        <div class="panel-head">
          <h2>打卡</h2>
        </div>
        <div class="checkin-form">
          <div class="location-info pending" id="location-info">
            <div class="location-status">正在获取位置...</div>
            <div class="location-detail">请允许浏览器获取您的位置信息</div>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label>关联商机（可选）</label>
              <select class="select" id="opportunity-select">
                <option value="">不关联商机</option>
              </select>
            </div>
            <div class="form-group">
              <label>打卡类型</label>
              <select class="select" id="checkin-type">
                <option value="visit">客户拜访</option>
                <option value="check_in">签到</option>
                <option value="check_out">签退</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>位置名称</label>
            <input class="input" id="location-name" type="text" placeholder="例如：XX公司、XX大厦" />
          </div>

          <div class="form-group">
            <label>备注</label>
            <textarea class="textarea" id="remark" placeholder="请输入拜访内容或备注信息"></textarea>
          </div>

          <div class="checkin-btn-wrap">
            <button class="btn btn-success" id="checkin-btn" style="flex:1;font-size:16px;padding:14px">
              确认打卡
            </button>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>今日打卡记录</h2>
          <span id="today-count">0 条</span>
        </div>
        <div class="records-list" id="today-records">
          <div class="empty">今日暂无打卡记录</div>
        </div>
      </section>
    </div>
  </div>
</main>

<script src="crm-common.js?v=owner-fix-20260511"></script>
<script>
var currentUser = CRMApp.requireAuth('checkin');
var currentLocation = null;
var todayRecords = [];
var opportunities = [];

function setUserUI() {
  document.getElementById('user-avatar').textContent = (currentUser.username || 'U').charAt(0).toUpperCase();
}

function formatTime(value) {
  if (!value) return '-';
  try {
    return new Date(value).toLocaleString('zh-CN');
  } catch (e) {
    return value;
  }
}

function getCheckinTypeLabel(type) {
  var labels = { visit: '客户拜访', check_in: '签到', check_out: '签退' };
  return labels[type] || type;
}

function getCheckinTypeIcon(type) {
  var icons = { visit: '🤝', check_in: '📍', check_out: '🏠' };
  return icons[type] || '📍';
}

function updateLocationUI(status, message, detail) {
  var el = document.getElementById('location-info');
  el.className = 'location-info ' + status;
  el.innerHTML = '<div class="location-status">' + CRMApp.escapeHtml(message) + '</div>' +
    '<div class="location-detail">' + CRMApp.escapeHtml(detail || '') + '</div>';
}

function initGeolocation() {
  if (!navigator.geolocation) {
    updateLocationUI('error', '浏览器不支持定位', '请使用支持定位的浏览器');
    return;
  }

  updateLocationUI('pending', '正在获取位置...', '请允许浏览器获取您的位置信息');

  navigator.geolocation.getCurrentPosition(
    function(position) {
      currentLocation = {
        latitude: position.coords.latitude,
        longitude: position.coords.longitude
      };
      updateLocationUI('success', '定位成功',
        '纬度: ' + currentLocation.latitude.toFixed(6) + ', 经度: ' + currentLocation.longitude.toFixed(6));
      document.getElementById('checkin-btn').disabled = false;
    },
    function(error) {
      var messages = {
        1: '用户拒绝了定位请求',
        2: '无法获取位置信息',
        3: '定位请求超时'
      };
      updateLocationUI('error', '定位失败', messages[error.code] || '未知错误');
      document.getElementById('checkin-btn').disabled = true;
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 60000
    }
  );
}

async function loadOpportunities() {
  try {
    var response = await CRMApp.apiRequest('/api/opportunities?page=1&page_size=100');
    var rows = (response && response.data) || [];
    var select = document.getElementById('opportunity-select');
    var options = ['<option value="">不关联商机</option>'];
    rows.forEach(function(item) {
      var label = (item.customer_name || '未知客户') + ' - ' + (item.product_name || '未知产品');
      options.push('<option value="' + item.id + '">' + CRMApp.escapeHtml(label) + '</option>');
    });
    select.innerHTML = options.join('');
  } catch (error) {
    console.error('加载商机列表失败:', error);
  }
}

async function loadTodayRecords() {
  try {
    var response = await CRMApp.apiRequest('/api/checkins/my-today');
    todayRecords = response.records || [];
    document.getElementById('stat-today').textContent = response.count || 0;
    document.getElementById('today-count').textContent = (response.count || 0) + ' 条';
    renderTodayRecords();
  } catch (error) {
    console.error('加载今日打卡记录失败:', error);
  }
}

async function loadStats() {
  try {
    var response = await CRMApp.apiRequest('/api/checkins/stats?days=7');
    var total = 0;
    (response.stats || []).forEach(function(item) {
      total += item.count;
    });
    document.getElementById('stat-week').textContent = total;
  } catch (error) {
    console.error('加载统计数据失败:', error);
  }
}

function renderTodayRecords() {
  var container = document.getElementById('today-records');
  if (!todayRecords.length) {
    container.innerHTML = '<div class="empty">今日暂无打卡记录</div>';
    return;
  }

  container.innerHTML = todayRecords.map(function(record) {
    return '<div class="record-item">' +
      '<div class="record-icon">' + getCheckinTypeIcon(record.checkin_type) + '</div>' +
      '<div class="record-content">' +
        '<div class="record-header">' +
          '<div class="record-title">' + CRMApp.escapeHtml(getCheckinTypeLabel(record.checkin_type)) + '</div>' +
          '<div class="record-time">' + CRMApp.escapeHtml(formatTime(record.created_at)) + '</div>' +
        '</div>' +
        '<div class="record-meta">' +
          (record.customer_name ? '客户: ' + CRMApp.escapeHtml(record.customer_name) + ' · ' : '') +
          (record.location_name ? '位置: ' + CRMApp.escapeHtml(record.location_name) : '未填写位置名称') +
        '</div>' +
        (record.remark ? '<div class="record-remark">' + CRMApp.escapeHtml(record.remark) + '</div>' : '') +
      '</div>' +
    '</div>';
  }).join('');
}

async function doCheckin() {
  if (!currentLocation) {
    alert('请等待定位完成后再打卡');
    return;
  }

  var btn = document.getElementById('checkin-btn');
  btn.disabled = true;
  btn.textContent = '打卡中...';

  try {
    var opportunityId = document.getElementById('opportunity-select').value || null;
    var customerName = '';

    if (opportunityId) {
      var option = document.getElementById('opportunity-select').selectedOptions[0];
      customerName = option ? option.textContent.split(' - ')[0] : '';
    }

    var payload = {
      latitude: currentLocation.latitude,
      longitude: currentLocation.longitude,
      location_name: document.getElementById('location-name').value.trim() || null,
      checkin_type: document.getElementById('checkin-type').value,
      remark: document.getElementById('remark').value.trim() || null,
      customer_name: customerName || null,
      opportunity_id: opportunityId
    };

    await CRMApp.apiRequest('/api/checkins', {
      method: 'POST',
      body: payload
    });

    // 清空表单
    document.getElementById('remark').value = '';
    document.getElementById('location-name').value = '';

    alert('打卡成功！');
    await loadTodayRecords();
    await loadStats();
  } catch (error) {
    alert(error.message || '打卡失败');
  } finally {
    btn.disabled = false;
    btn.textContent = '确认打卡';
  }
}

function updateOpportunityStat() {
  var select = document.getElementById('opportunity-select');
  var selected = select.selectedOptions[0];
  document.getElementById('stat-opportunity').textContent = selected && selected.value ? selected.textContent.split(' - ')[0] : '-';
}

async function initPage() {
  if (!currentUser) return;
  try {
    currentUser = await CRMApp.apiRequest('/api/auth/me');
  } catch (error) {
    return;
  }
  setUserUI();
  initGeolocation();
  await Promise.all([
    loadOpportunities(),
    loadTodayRecords(),
    loadStats()
  ]);
}

document.getElementById('checkin-btn').addEventListener('click', doCheckin);
document.getElementById('refresh-btn').addEventListener('click', function() {
  loadTodayRecords();
  loadStats();
});
document.getElementById('opportunity-select').addEventListener('change', updateOpportunityStat);

initPage();
</script>
</body>
</html>
