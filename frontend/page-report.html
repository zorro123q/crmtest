<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商机通报 - SalesPilot CRM</title>
<style>
:root{
  --primary:#0ea5e9;
  --bg:#f1f5f9;
  --surface:#ffffff;
  --border:#e2e8f0;
  --text:#1e293b;
  --text2:#64748b;
  --shadow:0 1px 3px rgba(15,23,42,.08),0 10px 22px rgba(15,23,42,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
.sidebar{width:236px;background:linear-gradient(180deg,#0f172a 0%,#1e3a5f 55%,#0f172a 100%);color:#cbd5e1;padding:22px 0}
.logo{padding:0 20px 22px;border-bottom:1px solid rgba(255,255,255,.08)}
.logo-title{font-size:22px;font-weight:800;color:#fff}
.nav{padding:16px 12px 0}
.nav-section{margin-bottom:10px}
.nav-label{padding:0 12px 6px;font-size:10px;font-weight:700;color:#64748b;letter-spacing:1px;text-transform:uppercase}
.nav a{display:flex;align-items:center;gap:10px;color:#94a3b8;text-decoration:none;padding:11px 12px;border-radius:12px;font-size:14px;margin-bottom:6px}
.nav a:hover,.nav a.active{background:rgba(14,165,233,.14);color:#fff}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:linear-gradient(145deg,#fff,#f8fafc);border-bottom:1px solid var(--border);padding:18px 28px;display:flex;align-items:flex-start;gap:20px;justify-content:space-between}
.topbar-title{font-size:20px;font-weight:800}
.topbar-sub{margin-top:6px;font-size:13px;color:var(--text2);line-height:1.6}
.topbar-tools{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.select,.btn{padding:10px 14px;border-radius:12px;font-size:14px;border:1px solid var(--border);background:#fff}
.btn{cursor:pointer;font-weight:700}
.btn-primary{background:linear-gradient(135deg,#0ea5e9,#2563eb);color:#fff;border:none}
.avatar{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#0ea5e9,#0f766e);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700}
.content{flex:1;overflow-y:auto;padding:24px}
.notice{margin-bottom:18px;padding:14px 16px;border-radius:10px;background:#fffbeb;border:1px solid #f59e0b;color:#92400e;line-height:1.7;font-size:13px}
.report-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
.panel-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:12px}
.panel-head h2{font-size:18px;font-weight:800}
.panel-head span{font-size:13px;color:var(--text2)}
.table-wrap{overflow-x:auto;padding:16px;background:#fff8dc}
.excel-table{width:100%;min-width:1260px;border-collapse:collapse;table-layout:fixed;background:#fffbe6}
.excel-table th,.excel-table td{border:1px solid #111;padding:8px 10px;text-align:center;font-size:13px;line-height:1.4}
.excel-table th{background:#fde68a;font-weight:800}
.excel-table .metric-col{width:150px;background:#fcd34d}
.excel-table .group-head{background:#fbbf24}
.excel-table .target-head{background:#fef3c7}
.excel-table .actual-head{background:#fde68a}
.excel-table .metric-cell{background:#fef3c7;text-align:left;font-weight:800}
.excel-table .target-cell{background:#fffdf3;color:#475569}
.excel-table .actual-cell{background:#fff}
.excel-table .revenue-row .metric-cell,.excel-table .revenue-row .target-cell,.excel-table .revenue-row .actual-cell{color:#b91c1c;font-weight:900}
.empty{padding:28px;text-align:center;color:var(--text2)}
@media (max-width:860px){
  body{display:block}
  .sidebar{width:100%;padding:14px}
  .nav{padding:16px 0 0}
  .topbar{flex-direction:column;align-items:flex-start}
  .topbar-tools{justify-content:flex-start}
  .content{padding:16px}
}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="logo">
    <div class="logo-title">SalesPilot</div>
  </div>
  <nav class="nav">
    <div class="nav-section">
      <div class="nav-label">概览</div>
      <a href="crm-system.html">工作台</a>
      <a href="page-dashboard.html">销售仪表盘</a>
      <a href="page-funnel.html">商机漏斗</a>
    </div>
    <div class="nav-section">
      <div class="nav-label">销售管理</div>
      <a href="page-kanban.html">商机看板</a>
      <a href="page-leads.html">线索管理</a>
      <a href="page-opportunities.html">商机列表</a>
      <a href="page-report.html" class="active">商机通报</a>
    </div>
    <div class="nav-section">
      <div class="nav-label">AI 能力</div>
      <a href="ai-input.html">AI 智能录入</a>
      <a href="card-input.html">价值评估</a>
    </div>
    <div class="nav-section">
      <div class="nav-label">配置</div>
      <a href="page-metadata.html">元数据配置</a>
    </div>
  </nav>
</aside>

<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">商机通报</div>
      <div class="topbar-sub" id="scope-text">正在加载目标/实际对照表...</div>
    </div>
    <div class="topbar-tools">
      <select class="select" id="user-filter" style="display:none"></select>
      <button class="btn btn-primary" id="refresh-btn">刷新</button>
      <div class="avatar" id="user-avatar">U</div>
    </div>
  </div>

  <div class="content">
    <div class="notice">
      目标值暂按前端默认总目标和比例计算：老客户新业务总目标 0，新客户新老业务总目标 0；合同均额目标老客户 100，新客户 50。实际值来自后端实时商机数据。
    </div>

    <section class="report-panel">
      <div class="panel-head">
        <div>
          <h2>老客户新业务</h2>
        </div>
        <span id="old-updated">-</span>
      </div>
      <div class="table-wrap" id="old-table-wrap"></div>
    </section>

    <section class="report-panel">
      <div class="panel-head">
        <div>
          <h2>新客户新老业务</h2>
        </div>
        <span id="new-updated">-</span>
      </div>
      <div class="table-wrap" id="new-table-wrap"></div>
    </section>
  </div>
</div>

<script src="crm-common.js"></script>
<script>
var currentUser = CRMApp.requireAuth();
var users = [];
var currentReport = null;

var OLD_TOTAL_TARGET = 0;
var NEW_TOTAL_TARGET = 0;
var OLD_AVG_CONTRACT_TARGET = 100;
var NEW_AVG_CONTRACT_TARGET = 50;

var PIONEER_GROUP_MEMBERS = [];
var CHARGE_GROUP_MEMBERS = [];

var GROUPS = [
  { key: 'pioneer_leader', oldLabel: '先锋组组长：陈祺', newLabel: '先锋组组长：陈祺', oldRatio: 0.40, newRatio: 0.10 },
  { key: 'pioneer_group', oldLabel: '先锋组：小组人员（组长自行分配）', newLabel: '先锋组：小组渠道对接人', oldRatio: 0, newRatio: 0.30 },
  { key: 'charge_leader', oldLabel: '冲锋组组长：余浩然', newLabel: '冲锋组组长：余浩然', oldRatio: 0.30, newRatio: 0.20 },
  { key: 'charge_group', oldLabel: '冲锋组：小组人员（组长自行分配）', newLabel: '冲锋组：小组渠道对接人', oldRatio: 0, newRatio: 0.30 },
  { key: 'department', oldLabel: '部门（鑫健70%、春梅30%）', newLabel: '部门（鑫健70%、春梅30%）', oldRatio: 0.30, newRatio: 0.10 }
];

var OLD_METRICS = [
  { key: 'collected_info_count', label: '收集信息数', type: 'count' },
  { key: 'budget_count', label: '拿到预算数', type: 'count' },
  { key: 'solution_approved_count', label: '方案认可数', type: 'count' },
  { key: 'signed_count', label: '签约数', type: 'count' },
  { key: 'average_contract_amount', label: '合同均额', type: 'amount', average: true },
  { key: 'recognized_revenue', label: '确收额', type: 'amount', revenue: true }
];

var NEW_METRICS = [
  { key: 'collected_info_count', label: '收集信息数', type: 'count' },
  { key: 'valid_contact_count', label: '有效接触数', type: 'count' },
  { key: 'approval_count', label: '获得认可数', type: 'count' },
  { key: 'budget_count', label: '拿到预算数', type: 'count' },
  { key: 'solution_approved_count', label: '方案认可数', type: 'count' },
  { key: 'signed_count', label: '签约数', type: 'count' },
  { key: 'average_contract_amount', label: '合同均额', type: 'amount', average: true },
  { key: 'recognized_revenue', label: '确收额', type: 'amount', revenue: true }
];

function setUserUI() {
  document.getElementById('user-avatar').textContent = (currentUser.username || 'U').charAt(0).toUpperCase();
}

function setScopeText(text) {
  document.getElementById('scope-text').textContent = text;
}

function formatNumber(value) {
  return Number(value || 0).toLocaleString('zh-CN', { maximumFractionDigits: 2 });
}

function formatAmount(value) {
  return '￥' + Number(value || 0).toLocaleString('zh-CN', {
    minimumFractionDigits: 0,
    maximumFractionDigits: 2
  });
}

function formatValue(value, metric) {
  return metric.type === 'amount' ? formatAmount(value) : formatNumber(value);
}

function getTargetValue(moduleKey, group, metric) {
  if (metric.average) {
    return moduleKey === 'old' ? OLD_AVG_CONTRACT_TARGET : NEW_AVG_CONTRACT_TARGET;
  }
  var totalTarget = moduleKey === 'old' ? OLD_TOTAL_TARGET : NEW_TOTAL_TARGET;
  var ratio = moduleKey === 'old' ? group.oldRatio : group.newRatio;
  return Number((totalTarget * ratio).toFixed(2));
}

function renderTargetTable(options) {
  var moduleData = options.data || {};
  var moduleKey = options.moduleKey;
  var metrics = options.metrics;
  var labelKey = moduleKey === 'old' ? 'oldLabel' : 'newLabel';

  var headerTop = '<tr><th class="metric-col" rowspan="2">指标</th>' + GROUPS.map(function(group) {
    return '<th class="group-head" colspan="2">' + CRMApp.escapeHtml(group[labelKey]) + '</th>';
  }).join('') + '</tr>';

  var headerBottom = '<tr>' + GROUPS.map(function() {
    return '<th class="target-head">目标</th><th class="actual-head">实际</th>';
  }).join('') + '</tr>';

  var body = metrics.map(function(metric) {
    var rowClass = metric.revenue ? ' class="revenue-row"' : '';
    return '<tr' + rowClass + '>' +
      '<td class="metric-cell">' + CRMApp.escapeHtml(metric.label) + '</td>' +
      GROUPS.map(function(group) {
        var groupMetrics = moduleData[group.key] || {};
        var target = getTargetValue(moduleKey, group, metric);
        var actual = groupMetrics[metric.key] || 0;
        return '<td class="target-cell">' + formatValue(target, metric) + '</td>' +
          '<td class="actual-cell">' + formatValue(actual, metric) + '</td>';
      }).join('') +
    '</tr>';
  }).join('');

  return '<table class="excel-table"><thead>' + headerTop + headerBottom + '</thead><tbody>' + body + '</tbody></table>';
}

function renderReport(payload) {
  currentReport = payload || {};
  document.getElementById('old-table-wrap').innerHTML = renderTargetTable({
    moduleKey: 'old',
    data: currentReport.old_customer_new_business || {},
    metrics: OLD_METRICS
  });
  document.getElementById('new-table-wrap').innerHTML = renderTargetTable({
    moduleKey: 'new',
    data: currentReport.new_customer_business || {},
    metrics: NEW_METRICS
  });
  var timestamp = '更新时间：' + new Date().toLocaleString('zh-CN');
  document.getElementById('old-updated').textContent = timestamp;
  document.getElementById('new-updated').textContent = timestamp;
}

function appendMemberParams(params) {
  PIONEER_GROUP_MEMBERS.forEach(function(name) {
    if (name) params.append('pioneer_members', name);
  });
  CHARGE_GROUP_MEMBERS.forEach(function(name) {
    if (name) params.append('charge_members', name);
  });
}

async function loadUsersIfAdmin() {
  if (!CRMApp.isAdmin(currentUser)) return;

  users = await CRMApp.apiRequest('/api/admin/users');
  var select = document.getElementById('user-filter');
  select.style.display = 'inline-flex';
  select.innerHTML = '<option value="all">全部用户</option>' + users.map(function(user) {
    return '<option value="' + CRMApp.escapeHtml(user.id) + '">' + CRMApp.escapeHtml(user.username) + '</option>';
  }).join('');
}

async function loadReport() {
  try {
    setScopeText('正在加载目标/实际对照表...');
    var params = new URLSearchParams();
    appendMemberParams(params);

    if (CRMApp.isAdmin(currentUser)) {
      var selectedUserId = document.getElementById('user-filter').value || 'all';
      if (selectedUserId !== 'all') {
        params.set('user_id', selectedUserId);
      }
    }

    var query = params.toString();
    var payload = await CRMApp.apiRequest('/api/opportunity-report/target-table' + (query ? '?' + query : ''));
    renderReport(payload);

    if (CRMApp.isAdmin(currentUser)) {
      var selected = document.getElementById('user-filter').value || 'all';
      if (selected === 'all') {
        setScopeText('管理员范围：全部用户；仅统计已审核通过商机（旧库无 review_status 字段时自动兼容）。');
      } else {
        var selectedUser = users.find(function(user) { return user.id === selected; });
        setScopeText('管理员范围：' + (selectedUser ? selectedUser.username : '所选用户'));
      }
    } else {
      setScopeText('当前用户范围：' + currentUser.username);
    }
  } catch (error) {
    setScopeText(error.message || '加载商机通报失败。');
    document.getElementById('old-table-wrap').innerHTML = '<div class="empty">暂无数据</div>';
    document.getElementById('new-table-wrap').innerHTML = '<div class="empty">暂无数据</div>';
  }
}

async function initPage() {
  if (!currentUser) return;
  setUserUI();
  if (CRMApp.isAdmin(currentUser)) {
    await loadUsersIfAdmin();
    document.getElementById('user-filter').addEventListener('change', loadReport);
  }
  await loadReport();
}

document.getElementById('refresh-btn').addEventListener('click', loadReport);
initPage();
</script>
</body>
</html>
