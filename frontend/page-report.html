<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商机通报 — SalesPilot CRM</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
:root{--primary:#0EA5E9;--primary-light:#E0F2FE;--accent:#8B5CF6;--success:#10B981;--warning:#F59E0B;--danger:#EF4444;--bg:#F1F5F9;--surface:#FFFFFF;--border:#E2E8F0;--text:#1E293B;--text2:#64748B;--text3:#94A3B8;--shadow:0 1px 3px rgba(15,23,42,0.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;background:linear-gradient(180deg,#0F172A 0%,#1E3A5F 50%,#0F172A 100%);color:#CBD5E1;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.logo{padding:24px 20px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.06)}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#0EA5E9,#6366F1);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-text{font-size:18px;font-weight:700;background:linear-gradient(135deg,#fff,#0EA5E9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:10px;color:#64748B;margin-top:2px}
.nav-section{padding:16px 0 8px}
.nav-label{font-size:10px;font-weight:600;color:#475569;letter-spacing:1px;text-transform:uppercase;padding:0 20px 6px}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;font-size:14px;border-left:3px solid transparent;transition:all .2s;color:#94A3B8;text-decoration:none}
.nav-item:hover{background:rgba(14,165,233,.08);color:#E2E8F0}
.nav-item.active{background:linear-gradient(90deg,rgba(14,165,233,.15) 0%,transparent 100%);color:#fff;font-weight:600;border-left-color:#0EA5E9}
.nav-item .icon{font-size:18px;width:22px}
.nav-badge{margin-left:auto;background:linear-gradient(135deg,#0EA5E9,#6366F1);color:#fff;font-size:10px;border-radius:12px;padding:2px 8px;font-weight:700}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:linear-gradient(145deg,#FFFFFF,#F8FAFC);border-bottom:1px solid var(--border);padding:0 28px;height:64px;display:flex;align-items:center;gap:20px}
.topbar-title{font-size:20px;font-weight:700;color:var(--text);flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#0EA5E9,#6366F1);color:#fff}
.avatar{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#0EA5E9,#6366F1);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700}
.content{flex:1;overflow-y:auto;padding:24px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:28px}
.kpi-card{background:var(--surface);border-radius:16px;padding:24px;box-shadow:var(--shadow);position:relative;overflow:hidden;border:1px solid var(--border)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#0EA5E9,#6366F1)}
.kpi-label{font-size:13px;color:var(--text2);font-weight:500;margin-bottom:12px}
.kpi-value{font-size:32px;font-weight:800;color:var(--text);line-height:1}
.kpi-value.blue{color:var(--primary)}.kpi-value.green{color:var(--success)}.kpi-value.orange{color:var(--accent)}
.chart-card{background:var(--surface);border-radius:16px;padding:24px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:20px}
.chart-title{font-size:16px;font-weight:700;margin-bottom:16px}
.table-wrap{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--border);margin-bottom:20px}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{background:linear-gradient(135deg,#F8FAFC,#F1F5F9);padding:14px 18px;text-align:left;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;border-bottom:1px solid var(--border)}
.data-table td{padding:14px 18px;border-bottom:1px solid var(--border)}
.tag{display:inline-flex;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.tag-green{background:#F0FFF4;color:#059669}.tag-blue{background:#EFF6FF;color:#1D4ED8}.tag-orange{background:#FFF7ED;color:#D97706}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">
    <div class="logo-icon">🚀</div>
    <div><div class="logo-text">SalesPilot</div><div class="logo-sub">CRM · AI Powered</div></div>
  </div>
  <div class="nav-section">
    <div class="nav-label">概览</div>
    <a class="nav-item" href="page-dashboard.html"><span class="icon">📊</span>销售仪表盘</a>
    <a class="nav-item" href="page-funnel.html"><span class="icon">🔻</span>商机漏斗</a>
  </div>
  <div class="nav-section">
    <div class="nav-label">销售管理</div>
    <a class="nav-item" href="page-kanban.html"><span class="icon">🗂️</span>商机看板<span class="nav-badge">12</span></a>
    <a class="nav-item" href="page-leads.html"><span class="icon">👥</span>线索管理<span class="nav-badge">8</span></a>
    <a class="nav-item" href="page-opportunities.html"><span class="icon">💼</span>商机列表</a>
    <a class="nav-item active" href="page-report.html"><span class="icon">📋</span>商机通报</a>
  </div>
  <div class="nav-section">
    <div class="nav-label">AI 能力</div>
    <a class="nav-item" href="ai-input.html"><span class="icon">🤖</span>AI 智能录入</a>
    <a class="nav-item" href="card-input.html"><span class="icon">🎯</span>价值评估</a>
  </div>
  <div class="nav-section">
    <div class="nav-label">配置</div>
    <a class="nav-item" href="page-metadata.html"><span class="icon">⚙️</span>元数据配置</a>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">商机通报 <span class="topbar-sub">自动关联商机数据</span></div>
    <div class="avatar">管</div>
  </div>

  <div class="content">
    <!-- KPI -->
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">商机总数</div><div class="kpi-value blue">47</div></div>
      <div class="kpi-card"><div class="kpi-label">已赢单</div><div class="kpi-value green">18</div></div>
      <div class="kpi-card"><div class="kpi-label">总金额</div><div class="kpi-value">¥2,847万</div></div>
      <div class="kpi-card"><div class="kpi-label">赢单金额</div><div class="kpi-value green">¥1,520万</div></div>
    </div>

    <!-- 按客户类型 -->
    <div class="chart-card">
      <div class="chart-title">📊 按客户类型分类</div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>客户类型</th><th>商机数</th><th>总金额</th><th>赢单数</th><th>赢单率</th></tr></thead>
          <tbody id="type-table"></tbody>
        </table>
      </div>
    </div>

    <!-- 按负责人 -->
    <div class="chart-card">
      <div class="chart-title">👥 按负责人统计</div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>负责人</th><th>商机数</th><th>总金额</th><th>赢单数</th><th>赢单率</th></tr></thead>
          <tbody id="owner-table"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
var opps = [
  {id:1,company:'北京保险集团',name:'智能客服升级',amount:280,stage:'方案认可',owner:'张三',type:'老客户'},
  {id:2,company:'上海物流公司',name:'呼叫中心建设',amount:150,stage:'有效接触',owner:'李四',type:'新客户'},
  {id:3,company:'深圳科技集团',name:'AI质检部署',amount:420,stage:'签约回款',owner:'王五',type:'老客户'},
  {id:4,company:'广州零售连锁',name:'会员营销系统',amount:85,stage:'收集信息',owner:'赵六',type:'新客户'},
  {id:5,company:'杭州电商平台',name:'智能外呼机器人',amount:200,stage:'方案认可',owner:'张三',type:'老客户'},
  {id:6,company:'成都制造企业',name:'智能客服系统',amount:120,stage:'拿到预算',owner:'李四',type:'新客户'},
  {id:7,company:'武汉通信运营商',name:'人机协同平台',amount:350,stage:'方案认可',owner:'王五',type:'老客户'},
  {id:8,company:'南京政务服务',name:'12345热线升级',amount:180,stage:'收集信息',owner:'赵六',type:'新客户'},
  {id:9,company:'北京保险集团',name:'催收机器人',amount:95,stage:'签约回款',owner:'张三',type:'老客户'},
  {id:10,company:'上海物流公司',name:'物流客服外包',amount:65,stage:'有效接触',owner:'李四',type:'新客户'},
  {id:11,company:'深圳科技集团',name:'智能培训系统',amount:160,stage:'拿到预算',owner:'王五',type:'老客户'},
  {id:12,company:'广州零售连锁',name:'门店客服系统',amount:75,stage:'收集信息',owner:'赵六',type:'新客户'}
];

// 按客户类型统计
var typeStats = {'老客户':{count:6,amount:1305,won:3},'新客户':{count:6,amount:595,won:1}};
var typeHtml = '';
for(var t in typeStats){var s=typeStats[t];typeHtml+='<tr><td><span class="tag '+(t==='老客户'?'tag-green':'tag-blue')+'">'+t+'</span></td><td>'+s.count+'</td><td><strong>¥'+s.amount+'万</strong></td><td>'+s.won+'</td><td>'+(s.count>0?Math.round(s.won/s.count*100)+'%':'0%')+'</td></tr>';}
document.getElementById('type-table').innerHTML=typeHtml;

// 检查用户权限
function checkPermission() {
  var user = localStorage.getItem('crm_user');
  if (!user) {
    window.location.href = 'login.html';
    return null;
  }
  return JSON.parse(user);
}

// 页面加载时检查权限
document.addEventListener('DOMContentLoaded', function() {
  checkPermission();
});

// 按负责人统计
var ownerStats = {};
opps.forEach(function(o){if(!ownerStats[o.owner])ownerStats[o.owner]={count:0,amount:0,won:0};ownerStats[o.owner].count++;ownerStats[o.owner].amount+=o.amount;if(o.stage==='签约回款')ownerStats[o.owner].won++;});
var ownerHtml='';for(var k in ownerStats){var s=ownerStats[k];ownerHtml+='<tr><td>'+k+'</td><td>'+s.count+'</td><td><strong>¥'+s.amount+'万</strong></td><td>'+s.won+'</td><td>'+(s.count>0?Math.round(s.won/s.count*100)+'%':'0%')+'</td></tr>';}
document.getElementById('owner-table').innerHTML=ownerHtml;
</script>
</body>
</html>
