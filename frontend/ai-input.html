<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 智能录入 - SalesPilot</title>
<style>
:root{
  --primary:#0066FF;
  --primary-dark:#0052CC;
  --primary-light:#E8F0FF;
  --success:#00C48C;
  --warning:#FFB020;
  --danger:#FF4D4F;
  --bg:#F0F2F5;
  --surface:#FFFFFF;
  --border:#E4E7EC;
  --text:#1A202C;
  --text2:#64748B;
  --text3:#94A3B8;
  --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
  color:var(--text);
  max-width:520px;
  margin:0 auto;
}
.header{
  padding:18px 18px 22px;
  background:linear-gradient(135deg,#0066FF,#5B49E6);
  color:#fff;
  position:sticky;
  top:0;
  z-index:10;
  box-shadow:0 10px 24px rgba(0,102,255,.2);
}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
.back-btn,.desktop-link{
  border:none;background:rgba(255,255,255,.18);color:#fff;border-radius:999px;
  padding:8px 12px;font-size:13px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center
}
.title{font-size:18px;font-weight:800}
.desc{font-size:13px;line-height:1.7;opacity:.9;margin-top:12px}
.page{padding:16px 16px 28px}
.card{
  background:var(--surface);
  border-radius:var(--radius);
  box-shadow:0 2px 8px rgba(15,23,42,.06);
  padding:16px;
  margin-bottom:14px;
}
.card-title{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.badge{
  display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;
  background:var(--primary-light);color:var(--primary-dark);font-size:12px;font-weight:700
}
.hint{font-size:12px;color:var(--text2);line-height:1.7}
.textarea{
  width:100%;border:1px solid var(--border);border-radius:14px;padding:14px;font-size:14px;line-height:1.7;
  min-height:160px;resize:vertical;font-family:inherit;background:#FBFCFE
}
.textarea:focus{outline:none;border-color:#8CB8FF;box-shadow:0 0 0 3px rgba(0,102,255,.12);background:#fff}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.btn{
  width:100%;border:none;border-radius:14px;padding:13px 16px;font-size:14px;font-weight:800;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;gap:8px
}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff}
.btn-ghost{background:#fff;border:1px solid var(--border);color:var(--text)}
.btn-record{background:linear-gradient(135deg,#FF4D4F,#C81E1E);color:#fff}
.btn-record.idle{background:linear-gradient(135deg,#0F766E,#0EA5E9)}
.btn-record.connecting,.btn-record.stopping{background:linear-gradient(135deg,#F59E0B,#EA580C)}
.btn:disabled{opacity:.55;cursor:not-allowed}
.realtime-panel{margin-top:12px;border:1px solid var(--border);border-radius:14px;background:#F8FAFC;padding:12px;display:grid;gap:10px}
.realtime-line{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);line-height:1.5}
.realtime-status{font-weight:800;color:var(--text)}
.realtime-meta{margin-left:auto;color:var(--text3);font-weight:700}
.realtime-dot{width:9px;height:9px;border-radius:50%;background:#CBD5E1;flex:none}
.realtime-dot.connecting,.realtime-dot.stopping{background:var(--warning)}
.realtime-dot.connected{background:var(--success)}
.realtime-dot.recording{background:var(--danger);box-shadow:0 0 0 6px rgba(255,77,79,.12);animation:pulse 1.1s ease-in-out infinite}
.realtime-result{min-height:48px;border-radius:12px;background:#fff;border:1px solid #E2E8F0;padding:10px;font-size:13px;line-height:1.7;color:var(--text);word-break:break-word}
.realtime-final{font-weight:700}
.realtime-interim{color:var(--primary-dark)}
.realtime-placeholder{color:var(--text3)}
.field{padding:12px 0;border-bottom:1px solid var(--border)}
.field:last-child{border-bottom:none;padding-bottom:0}
.field-label{font-size:12px;color:var(--text3);font-weight:700;margin-bottom:4px}
.field-value{font-size:14px;font-weight:700;line-height:1.7}
.field-value.amount{color:var(--primary-dark);font-size:18px}
.result-section{border:1px solid var(--border);border-radius:14px;margin-top:12px;overflow:hidden;background:#FBFCFE}
.result-section-title{padding:12px 14px;background:#F8FAFC;font-size:14px;font-weight:800;border-bottom:1px solid var(--border)}
.field-group{padding:12px 14px;border-bottom:1px solid var(--border)}
.field-group:last-child{border-bottom:none}
.field-group-title{font-size:13px;font-weight:800;margin-bottom:8px;color:var(--primary-dark)}
.result-grid{display:grid;grid-template-columns:1fr;gap:8px}
.result-row{display:grid;grid-template-columns:118px 1fr;gap:10px;font-size:13px;line-height:1.6}
.result-label{color:var(--text2);font-weight:700}
.result-value{color:var(--text);word-break:break-word}
.save-options{display:grid;gap:10px;margin-top:14px}
.check-line{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800}
.check-line input{width:16px;height:16px}
.save-status{margin-top:12px;padding:12px;border-radius:12px;background:#ECFDF5;color:#047857;font-size:13px;line-height:1.7;display:none}
.tag{display:inline-flex;padding:4px 10px;border-radius:999px;background:#EFF6FF;color:#1D4ED8;font-size:12px;font-weight:800}
.progress{height:8px;background:#E2E8F0;border-radius:999px;overflow:hidden;margin-top:10px}
.progress-fill{height:100%;background:linear-gradient(90deg,#00C48C,#0066FF);width:0;transition:width .3s ease}
.history-item{padding:12px 0;border-bottom:1px solid var(--border)}
.history-item:last-child{border-bottom:none}
.history-title{font-size:14px;font-weight:800}
.history-meta{font-size:12px;color:var(--text2);margin-top:6px;line-height:1.7}
.toast{
  position:fixed;left:50%;top:18px;transform:translateX(-50%) translateY(-16px);
  background:#111827;color:#fff;padding:10px 16px;border-radius:999px;font-size:13px;font-weight:700;
  opacity:0;transition:.25s;pointer-events:none;z-index:50
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{
  position:fixed;inset:0;background:rgba(255,255,255,.78);backdrop-filter:blur(3px);
  display:none;align-items:center;justify-content:center;z-index:40
}
.loading-box{background:#fff;border-radius:18px;padding:22px 24px;text-align:center;box-shadow:0 24px 60px rgba(15,23,42,.15)}
.spinner{width:36px;height:36px;border:4px solid var(--primary-light);border-top-color:var(--primary);border-radius:50%;margin:0 auto 12px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.45)}}
</style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <button class="back-btn" onclick="window.location.href='crm-system.html'">返回</button>
      <div class="title">AI 智能录入</div>

      </div>
      <div class="btn-row">

        <button class="btn btn-primary" onclick="runAI()">AI 解析</button>
      </div>
      <div class="hint" id="record-hint" style="margin-top:12px">开始录音后会实时转写到文本框，再由 AI 解析为结构化商机数据。</div>
      <div class="realtime-panel">
        <div class="realtime-line">
          <span class="realtime-dot idle" id="realtime-dot"></span>
          <span class="realtime-status" id="realtime-status">实时转写就绪</span>

        </div>
        <div class="realtime-result">
          <span class="realtime-final" id="realtime-final"></span><span class="realtime-interim" id="realtime-interim"></span>
          <span class="realtime-placeholder" id="realtime-placeholder">识别文字会同步进入上方文本框。</span>
        </div>
      </div>
    </div>

    <div class="card" id="result-card" style="display:none">
      <div class="card-title">✨ 解析结果</div>
      <div class="result-section">
        <div class="result-section-title">客户跟踪信息表解析结果</div>
        <div id="lead-result"></div>
      </div>
      <div class="result-section">
        <div class="result-section-title">客户商机管理表解析结果</div>
        <div id="opportunity-result"></div>
      </div>
      <div class="field">
        <div class="field-label">AI 置信度 <span id="field-score">0%</span></div>
        <div class="progress"><div class="progress-fill" id="score-fill"></div></div>
      </div>
      <div class="field">
        <div class="field-label">缺失字段</div>
        <div class="field-value" id="field-missing">-</div>
      </div>
      <div class="field">
        <div class="field-label">AI 建议</div>
        <div class="field-value" id="field-suggestion">-</div>
      </div>
      <div class="save-options">
        <label class="check-line"><input type="checkbox" id="save-to-lead"> 保存到客户跟踪信息表 / 线索表</label>
        <label class="check-line"><input type="checkbox" id="save-to-opportunity"> 保存到客户商机管理表 / 商机表</label>
      </div>
      <div class="save-status" id="save-status"></div>
      <div class="btn-row" style="margin-top:16px">
        <button class="btn btn-ghost" onclick="resetResult()">重新编辑</button>
        <button class="btn btn-primary" onclick="confirmSave()">确认保存</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🕘 本次会话保存记录</div>
      <div id="history-list" class="hint">暂未保存任何数据。</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="loading" id="loading">
    <div class="loading-box">
      <div class="spinner"></div>
      <div id="loading-text">AI 正在处理中...</div>
    </div>
  </div>

<script src="crm-common.js"></script>

var realtimeState = 'idle';
var realtimeBaseText = '';
var realtimeFinalText = '';
var realtimeInterimText = '';
var realtimeFrameCount = 0;

function setUserInfo() {
  // document.getElementById('user-badge').textContent = (currentUser.username || '当前用户') + ' · 保存后归属本人';
  document.getElementById('user-badge').textContent = (currentUser.username || '当前用户');
}

function showToast(message) {
  var toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(function() {
    toast.classList.remove('show');
  }, 2400);
}

function setLoading(visible, text) {
  document.getElementById('loading').style.display = visible ? 'flex' : 'none';
  if (text) document.getElementById('loading-text').textContent = text;
}

function loadDemo() {
  document.getElementById('source-text').value = '张三 太保产险 老客户新部门 智能外呼加微：①在P01小保沟通业务场景中加设节点，推送加微相关信息，推动客户加微；②针对首续客户中，没有加微且没有任何接触的客户，进行智能语音外呼加微 智能质检 200万 3个月 A Q1 武全胜、戴康、罗汉等 项目沟通推进中 正在对接中 是 B 未启动 SaaS 否 否';
}

function clearText() {
  document.getElementById('source-text').value = '';
  realtimeBaseText = '';
  realtimeFinalText = '';
  realtimeInterimText = '';
  realtimeFrameCount = 0;
  renderRealtimeTranscript();
}

async function toggleRecord() {
  if (realtimeState !== 'idle') {
    stopRealtimeRecord();
    return;
  }

  startRealtimeRecord();
}

function setRealtimeState(state, message) {
  realtimeState = state;
  var btn = document.getElementById('record-btn');
  var dot = document.getElementById('realtime-dot');
  var status = document.getElementById('realtime-status');
  var hint = document.getElementById('record-hint');

  btn.classList.remove('idle', 'connecting', 'connected', 'recording', 'stopping');
  btn.classList.add(state);
  dot.className = 'realtime-dot ' + state;

  var labels = {
    idle: '开始实时转写',
    connecting: '连接中...',
    connected: '结束转写',
    recording: '结束转写',
    stopping: '结束中...'
  };
  var statuses = {
    idle: '实时转写就绪',
    connecting: '正在连接实时转写',
    connected: '已连接，开始说话',
    recording: '正在实时识别',
    stopping: '正在结束识别'
  };

  btn.textContent = labels[state] || labels.idle;
  status.textContent = message || statuses[state] || statuses.idle;
  hint.textContent = state === 'idle'
    ? '开始录音后会实时转写到文本框，再由 AI 解析为结构化商机数据。'
    : '实时转写中，识别文字会同步写入上方文本框。';
}

function renderRealtimeTranscript() {
  var finalEl = document.getElementById('realtime-final');
  var interimEl = document.getElementById('realtime-interim');
  var placeholderEl = document.getElementById('realtime-placeholder');
  var metaEl = document.getElementById('realtime-meta');
  var textEl = document.getElementById('source-text');
  var transcript = (realtimeFinalText + realtimeInterimText).trim();

  finalEl.textContent = realtimeFinalText;
  interimEl.textContent = realtimeInterimText;
  placeholderEl.style.display = transcript ? 'none' : 'inline';
  metaEl.textContent = realtimeFrameCount + ' 帧';

  if (transcript || realtimeBaseText) {
    textEl.value = realtimeBaseText && transcript
      ? realtimeBaseText + '\n' + transcript
      : (realtimeBaseText || transcript);
  }
}

function resetRealtimeTranscript() {
  realtimeBaseText = document.getElementById('source-text').value.trim();
  realtimeFinalText = '';
  realtimeInterimText = '';
  realtimeFrameCount = 0;
  renderRealtimeTranscript();
}

async function startRealtimeRecord() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showToast('当前浏览器不支持录音');
    return;
  }

  try {
    resetRealtimeTranscript();
    setRealtimeState('connecting', '正在申请麦克风权限...');
    realtimeClient = createRealtimeAsrClient({
      onStarted: function(sid) {
        setRealtimeState('connected', sid ? '已连接，sid: ' + sid : '已连接，开始说话');
      },
      onRecordStarted: function() {
        setRealtimeState('recording', '麦克风已开始采集');
      },
      onAudioFrame: function(frameCount) {
        realtimeFrameCount = frameCount;
        document.getElementById('realtime-meta').textContent = realtimeFrameCount + ' 帧';
      },
      onResult: function(finalText, interimText) {
        realtimeFinalText = finalText;
        realtimeInterimText = interimText;
        renderRealtimeTranscript();
      },
      onError: function(message) {
        showToast(message || '实时转写失败');
        setRealtimeState('idle', '实时转写失败');
        realtimeClient = null;
      },
      onClose: function() {
        if (realtimeState !== 'idle' && realtimeState !== 'stopping') {
          setRealtimeState('idle', '实时转写已关闭');
        }
        realtimeClient = null;
      },
      onMaxDuration: function() {
        showToast('实时转写达到最大时长，正在自动结束');
        stopRealtimeRecord();
      }
    });
    await realtimeClient.start();
  } catch (error) {
    if (realtimeClient) {
      realtimeClient.destroy();
      realtimeClient = null;
    }
    setRealtimeState('idle', '实时转写就绪');
    showToast(error.message || '无法启动实时转写，请检查麦克风权限和讯飞配置');
  }
}

async function stopRealtimeRecord() {
  if (!realtimeClient) {
    setRealtimeState('idle', '实时转写就绪');
    return;
  }

  var client = realtimeClient;
  setRealtimeState('stopping', '正在结束并等待最终结果...');
  try {
    var finalText = await client.stop(12000);
    if (finalText) realtimeFinalText = finalText;
    realtimeInterimText = '';
    renderRealtimeTranscript();
    showToast(realtimeFinalText ? '实时转写完成' : '未收到识别文字');
  } catch (error) {
    showToast(error.message || '停止实时转写失败');
  } finally {
    client.destroy();
    if (realtimeClient === client) realtimeClient = null;
    setRealtimeState('idle', '实时转写就绪');
  }
}

function createRealtimeAsrClient(options) {
  var SAMPLE_RATE = 16000;
  var CHUNK_SIZE = 1280;
  var SEND_INTERVAL_MS = 40;
  var MAX_SILENCE_MS = 14000;
  var socket = null;
  var mediaStream = null;
  var audioContext = null;
  var sourceNode = null;
  var processorNode = null;
  var wsReady = false;
  var stopped = false;
  var destroyed = false;
  var pendingBytes = new Uint8Array(0);
  var audioQueue = [];
  var frameCount = 0;
  var totalBytes = 0;
  var audioSendTimer = null;
  var lastFrameSendAt = null;
  var silenceTimer = null;
  var stopTimer = null;
  var maxTimer = null;
  var stopResolve = null;
  var stopReject = null;
  var endSignalPending = false;
  var endSignalSent = false;
  var segMap = {};

  function cleanup(closeSocket) {
    stopAudioSendTimer();
    if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
    if (stopTimer) { clearTimeout(stopTimer); stopTimer = null; }
    if (maxTimer) { clearTimeout(maxTimer); maxTimer = null; }
    stopAudio();
    if (closeSocket !== false && socket) {
      try { socket.close(); } catch (e) {}
    }
    socket = null;
    wsReady = false;
    audioQueue = [];
    pendingBytes = new Uint8Array(0);
    lastFrameSendAt = null;
    endSignalPending = false;
  }

  function stopAudioSendTimer() {
    if (audioSendTimer) {
      clearInterval(audioSendTimer);
      audioSendTimer = null;
      console.log('[ASR] audio send timer stop');
    }
  }

  function stopAudio() {
    stopAudioSendTimer();
    if (processorNode) {
      try { processorNode.disconnect(); } catch (e) {}
      processorNode.onaudioprocess = null;
      processorNode = null;
    }
    if (sourceNode) {
      try { sourceNode.disconnect(); } catch (e) {}
      sourceNode = null;
    }
    if (audioContext) {
      try { audioContext.close(); } catch (e) {}
      audioContext = null;
    }
    if (mediaStream) {
      mediaStream.getTracks().forEach(function(track) { track.stop(); });
      mediaStream = null;
    }
  }

  function fail(message) {
    var msg = message || '实时转写失败';
    if (stopReject) {
      var reject = stopReject;
      stopResolve = null;
      stopReject = null;
      reject(new Error(msg));
    }
    cleanup();
    if (typeof options.onError === 'function') options.onError(msg);
  }

  function start() {
    return CRMApp.apiRequest('/api/ai/realtime-transcribe-url')
      .then(function(config) {
        CHUNK_SIZE = Number(config && config.chunk_size) || CHUNK_SIZE;
        SEND_INTERVAL_MS = Number(config && config.chunk_interval_ms) || SEND_INTERVAL_MS;
        var wsUrl = String(config && config.url || '');
        logWebSocketUrl(wsUrl);
        return startAudio(Number(config && config.max_duration_ms) || 60000).then(function() {
          return new Promise(function(resolve, reject) {
          socket = new WebSocket(wsUrl);
          socket.binaryType = 'arraybuffer';

          socket.onopen = function() {
            console.log('[ASR] ws open');
            wsReady = true;
            startAudioSendTimer();
            if (stopped) requestEndSignal();
            resolve();
          };

          socket.onmessage = handleMessage;
          socket.onerror = function(event) {
            console.error('[ASR] ws error:', event);
            var error = new Error('WebSocket 连接失败');
            reject(error);
            fail(error.message);
          };
          socket.onclose = function(event) {
            console.log('[ASR] ws close:', event && event.code, event && event.reason);
            var fullText = buildMergedText().fullText;
            if (stopResolve) {
              var resolveStop = stopResolve;
              stopResolve = null;
              stopReject = null;
              resolveStop(fullText);
            }
            cleanup(false);
            if (typeof options.onClose === 'function') options.onClose();
          };
        });
        });
      });
  }

  function logWebSocketUrl(wsUrl) {
    try {
      var parsed = new URL(wsUrl);
      console.log('[ASR] ws url host/path:', parsed.host, parsed.pathname);
      console.log('[ASR] ws url params:', Array.from(parsed.searchParams.keys()));
    } catch (error) {
      console.warn('[ASR] invalid ws url:', error);
    }
  }

  function startAudio(maxDuration) {
    var AudioContextCtor = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextCtor) {
      return Promise.reject(new Error('当前浏览器不支持 Web Audio 录音'));
    }

    return navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
        channelCount: 1
      }
    }).then(function(stream) {
      if (destroyed) throw new Error('实时转写已取消');
      mediaStream = stream;
      audioContext = new AudioContextCtor();
      console.log('[ASR] audioContext.sampleRate:', audioContext.sampleRate);
      sourceNode = audioContext.createMediaStreamSource(stream);
      processorNode = audioContext.createScriptProcessor(4096, 1, 1);

      processorNode.onaudioprocess = function(event) {
        if (destroyed || stopped) return;
        var input = event.inputBuffer.getChannelData(0);
        var output = event.outputBuffer.getChannelData(0);
        for (var i = 0; i < output.length; i += 1) output[i] = 0;

        var downsampled = downsampleBuffer(input, audioContext.sampleRate, SAMPLE_RATE);
        var pcmBytes = floatTo16BitPCM(downsampled);
        console.log('[ASR] downsampled.length:', downsampled.length);
        console.log('[ASR] pcmBytes.length:', pcmBytes.length);
        enqueuePcmBytes(pcmBytes);
      };

      sourceNode.connect(processorNode);
      processorNode.connect(audioContext.destination);
      maxTimer = setTimeout(function() {
        if (!destroyed && !stopped && typeof options.onMaxDuration === 'function') {
          options.onMaxDuration();
        }
      }, maxDuration);
      if (typeof options.onRecordStarted === 'function') options.onRecordStarted();
    });
  }

  function enqueuePcmBytes(bytes) {
    var incoming = bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes);
    if (!incoming.length) return;

    pendingBytes = concatBytes(pendingBytes, incoming);
    while (pendingBytes.length >= CHUNK_SIZE) {
      var chunk = pendingBytes.slice(0, CHUNK_SIZE);
      pendingBytes = pendingBytes.slice(CHUNK_SIZE);
      audioQueue.push(chunk);
    }
    startAudioSendTimer();
  }

  function startAudioSendTimer() {
    if (!wsReady || !socket || socket.readyState !== WebSocket.OPEN) return;
    if (audioSendTimer) {
      console.log('[ASR] audio send timer already running');
      return;
    }
    console.log('[ASR] audio send timer start interval:', SEND_INTERVAL_MS + 'ms');
    sendOneAudioFrame();
    if (!audioQueue.length || endSignalSent) return;
    audioSendTimer = setInterval(sendOneAudioFrame, SEND_INTERVAL_MS);
  }

  function sendOneAudioFrame() {
    if (!wsReady || !socket || socket.readyState !== WebSocket.OPEN) return;
    if (!audioQueue.length) {
      stopAudioSendTimer();
      if (endSignalPending) sendEndSignal();
      return;
    }
    var frame = audioQueue.shift();
    if (!(frame instanceof Uint8Array)) frame = new Uint8Array(frame);
    if (frame.byteLength !== CHUNK_SIZE) {
      console.warn('[ASR] skip invalid pcm frame bytes:', frame.byteLength);
      return;
    }
    var now = performance.now();
    var interval = lastFrameSendAt ? Math.round(now - lastFrameSendAt) : SEND_INTERVAL_MS;
    lastFrameSendAt = now;
    var frameBuffer = frame.buffer.slice(frame.byteOffset, frame.byteOffset + frame.byteLength);
    socket.send(frameBuffer);
    frameCount += 1;
    totalBytes += frame.byteLength;
    console.log('[ASR] downsampled samples:', frame.byteLength / 2);
    console.log('[ASR] pcm bytes:', frame.byteLength);
    console.log('[ASR] send pcm frame bytes:', frame.byteLength, 'interval:', interval + 'ms');
    if (typeof options.onAudioFrame === 'function') {
      options.onAudioFrame(frameCount, totalBytes);
    }
    resetSilenceTimer();
  }

  function resetSilenceTimer() {
    if (silenceTimer) clearTimeout(silenceTimer);
    silenceTimer = setTimeout(function() {
      if (!stopped && wsReady) {
        stopped = true;
        stopAudio();
        requestEndSignal();
      }
    }, MAX_SILENCE_MS);
  }

  function requestEndSignal() {
    endSignalPending = true;
    pendingBytes = new Uint8Array(0);
    if (audioQueue.length) {
      startAudioSendTimer();
      return;
    }
    sendEndSignal();
  }

  function sendEndSignal() {
    if (!socket || socket.readyState !== WebSocket.OPEN || !wsReady || endSignalSent) return;
    endSignalPending = false;
    endSignalSent = true;
    console.log('[ASR] send end');
    socket.send(JSON.stringify({ end: true }));
  }

  function handleMessage(event) {
    console.log('[ASR] ws message:', event.data);
    var message;
    try {
      message = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
    } catch (e) {
      return;
    }

    var action = String(message && message.action || '');
    var code = String(message && message.code || '0');
    if (action === 'started') {
      if (code !== '0') {
        console.error('[ASR] ws nonzero started:', message);
        fail(message.desc || '实时转写握手失败');
        return;
      }
      wsReady = true;
      if (typeof options.onStarted === 'function') options.onStarted(String(message.sid || ''));
      startAudioSendTimer();
      resetSilenceTimer();
      if (stopped) {
        startAudioSendTimer();
        requestEndSignal();
      }
      return;
    }

    if (action === 'result') {
      if (code !== '0') {
        console.error('[ASR] ws nonzero result:', message);
        fail(message.desc || '实时转写返回错误');
        return;
      }
      var parsed = parseRealtimeData(message.data);
      if (parsed.text) {
        if (parsed.type === '0') {
          segMap[parsed.segId] = parsed.text;
          delete segMap[parsed.segId + '_interim'];
        } else {
          segMap[parsed.segId + '_interim'] = parsed.text;
        }
        var merged = buildMergedText(parsed.segId);
        if (typeof options.onResult === 'function') {
          options.onResult(merged.finalText, merged.interimText, merged.fullText);
        }
      }
      if (parsed.isFinal && stopResolve) {
        var resolveStop = stopResolve;
        var fullText = buildMergedText().fullText;
        stopResolve = null;
        stopReject = null;
        resolveStop(fullText);
        cleanup();
      }
      return;
    }

    if (action === 'error') {
      console.error('[ASR] ws service error:', message);
      fail(message.desc || '实时转写服务端错误');
    }
  }

  function buildMergedText(currentSegId) {
    var finalKeys = Object.keys(segMap)
      .filter(function(key) { return key.indexOf('_interim') === -1; })
      .map(Number)
      .sort(function(a, b) { return a - b; });
    var finalText = finalKeys.map(function(key) { return segMap[key] || ''; }).join('');
    var interimText = '';
    if (currentSegId !== undefined && segMap[currentSegId + '_interim']) {
      interimText = segMap[currentSegId + '_interim'];
    } else {
      var interimKeys = Object.keys(segMap).filter(function(key) { return key.indexOf('_interim') > -1; });
      if (interimKeys.length) interimText = segMap[interimKeys[interimKeys.length - 1]] || '';
    }
    return {
      finalText: finalText,
      interimText: interimText,
      fullText: (finalText + interimText).trim()
    };
  }

  function stop(timeoutMs) {
    stopped = true;
    stopAudio();
    return new Promise(function(resolve, reject) {
      if (!socket || socket.readyState === WebSocket.CLOSED) {
        resolve(buildMergedText().fullText);
        cleanup();
        return;
      }
      stopResolve = resolve;
      stopReject = reject;
      if (wsReady) requestEndSignal();
      stopTimer = setTimeout(function() {
        if (stopResolve) {
          var resolveStop = stopResolve;
          stopResolve = null;
          stopReject = null;
          resolveStop(buildMergedText().fullText);
          cleanup();
        }
      }, Number(timeoutMs) || 12000);
    });
  }

  function destroy() {
    destroyed = true;
    if (stopResolve) {
      var resolveStop = stopResolve;
      stopResolve = null;
      stopReject = null;
      resolveStop(buildMergedText().fullText);
    }
    cleanup();
  }

  return { start: start, stop: stop, destroy: destroy };
}

function parseRealtimeData(dataStr) {
  try {
    var obj = typeof dataStr === 'string' ? JSON.parse(dataStr) : dataStr;
    var st = obj && obj.cn && obj.cn.st;
    var isFinal = !!(obj && obj.ls);
    var segId = Number(obj && obj.seg_id) || 0;
    var type = String(st && st.type || '0');
    var words = [];

    if (st && Array.isArray(st.rt)) {
      st.rt.forEach(function(rtItem) {
        (rtItem.ws || []).forEach(function(wsItem) {
          (wsItem.cw || []).forEach(function(cwItem) {
            var word = String(cwItem.w || '').trim();
            if (word) words.push(word);
          });
        });
      });
    }

    return { text: words.join(''), isFinal: isFinal, segId: segId, type: type };
  } catch (error) {
    return { text: '', isFinal: false, segId: 0, type: '0' };
  }
}

function downsampleBuffer(buffer, inputSampleRate, outputSampleRate) {
  if (inputSampleRate === outputSampleRate) return buffer;
  var ratio = inputSampleRate / outputSampleRate;
  var outputLength = Math.max(1, Math.round(buffer.length / ratio));
  var output = new Float32Array(outputLength);
  var offsetInput = 0;

  for (var offsetOutput = 0; offsetOutput < outputLength; offsetOutput += 1) {
    var nextOffsetInput = Math.round((offsetOutput + 1) * ratio);
    var accum = 0;
    var count = 0;
    for (var i = offsetInput; i < nextOffsetInput && i < buffer.length; i += 1) {
      accum += buffer[i];
      count += 1;
    }
    output[offsetOutput] = count ? accum / count : 0;
    offsetInput = nextOffsetInput;
  }

  return output;
}

function floatTo16BitPCM(float32Array) {
  var buffer = new ArrayBuffer(float32Array.length * 2);
  var view = new DataView(buffer);
  for (var i = 0; i < float32Array.length; i += 1) {
    var sample = Math.max(-1, Math.min(1, float32Array[i]));
    var intSample = sample < 0 ? sample * 0x8000 : sample * 0x7fff;
    view.setInt16(i * 2, intSample, true);
  }
  return new Uint8Array(buffer);
}

function concatBytes(left, right) {
  if (!left.length) return right;
  if (!right.length) return left;
  var merged = new Uint8Array(left.length + right.length);
  merged.set(left, 0);
  merged.set(right, left.length);
  return merged;
}

function stringToArrayBuffer(text) {
  var buffer = new ArrayBuffer(text.length);
  var view = new Uint8Array(buffer);
  for (var i = 0; i < text.length; i += 1) {
    view[i] = text.charCodeAt(i);
  }
  return buffer;
}

async function runAI() {
  var text = document.getElementById('source-text').value.trim();
  if (!text) {
    showToast('请先输入内容再解析');
    return;
  }

  try {
    setLoading(true, 'AI 正在解析文本...');
    currentResult = await CRMApp.apiRequest('/api/ai/parse', {
      method: 'POST',
      body: { text: text }
    });
    renderResult();
  } catch (error) {
    showToast(error.message || 'AI 解析失败');
  } finally {
    setLoading(false);
  }
}

function renderResult() {
  if (!currentResult) return;
  document.getElementById('result-card').style.display = 'block';
  renderGroupedFields('lead-result', LEAD_GROUPS, currentResult.lead || {});
  renderGroupedFields('opportunity-result', OPPORTUNITY_GROUPS, currentResult.opportunity || {});
  var score = Math.round(Number(currentResult.confidence_score || 0) * 100);
  document.getElementById('field-score').textContent = score + '%';
  document.getElementById('score-fill').style.width = score + '%';
  document.getElementById('field-missing').textContent = (currentResult.missing_fields || []).length
    ? currentResult.missing_fields.join('、')
    : '-';
  document.getElementById('field-suggestion').textContent = currentResult.suggestion || '-';
  renderSaveStatus(currentResult);
}

function renderGroupedFields(containerId, groups, data) {
  var container = document.getElementById(containerId);
  container.innerHTML = groups.map(function(group) {
    return '<div class="field-group">' +
      '<div class="field-group-title">' + CRMApp.escapeHtml(group.title) + '</div>' +
      '<div class="result-grid">' +
        group.fields.map(function(field) {
          var key = field[0];
          var label = field[1];
          var value = data[key];
          if (key === 'amount') {
            value = value ? '¥' + Number(value || 0).toLocaleString('zh-CN') : '';
          }
          return '<div class="result-row">' +
            '<div class="result-label">' + CRMApp.escapeHtml(label) + '</div>' +
            '<div class="result-value">' + CRMApp.escapeHtml(value || '-') + '</div>' +
          '</div>';
        }).join('') +
      '</div>' +
    '</div>';
  }).join('');
}

function renderSaveStatus(result) {
  var statusEl = document.getElementById('save-status');
  var lines = [];
  if (result && result.saved_to_lead && result.lead_id) {
    lines.push('已保存线索：' + result.lead_id);
  }
  if (result && result.saved_to_opportunity && result.opportunity_id) {
    lines.push('已保存商机：' + result.opportunity_id);
  }
  statusEl.style.display = lines.length ? 'block' : 'none';
  statusEl.innerHTML = lines.map(CRMApp.escapeHtml).join('<br>');
}

function resetResult() {
  currentResult = null;
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('save-to-lead').checked = false;
  document.getElementById('save-to-opportunity').checked = false;
  document.getElementById('save-status').style.display = 'none';
}

async function confirmSave() {
  if (!currentResult) return;

  var saveToLead = document.getElementById('save-to-lead').checked;
  var saveToOpportunity = document.getElementById('save-to-opportunity').checked;
  if (!saveToLead && !saveToOpportunity) {
    showToast('请至少选择一个保存目标');
    return;
  }

  var text = document.getElementById('source-text').value.trim();
  if (!text) {
    showToast('原始录入内容不能为空');
    return;
  }

  try {
    setLoading(true, '正在确认保存...');
    currentResult = await CRMApp.apiRequest('/api/ai/parse', {
      method: 'POST',
      body: {
        text: text,
        save_to_lead: saveToLead,
        save_to_opportunity: saveToOpportunity
      }
    });

    sessionHistory.unshift({
      leadId: currentResult.lead_id || '',
      opportunityId: currentResult.opportunity_id || '',
      unitName: currentResult.lead && currentResult.lead.unit_name || '',
      customerName: currentResult.opportunity && currentResult.opportunity.customer_name || '',
      time: new Date().toLocaleString('zh-CN')
    });

    renderResult();
    renderHistory();
    showToast('保存完成');
  } catch (error) {
    showToast(error.message || '保存失败');
  } finally {
    setLoading(false);
  }
}

function renderHistory() {
  var el = document.getElementById('history-list');
  if (!sessionHistory.length) {
    el.className = 'hint';
    el.textContent = '暂未保存任何数据。';
    return;
  }

  el.className = '';
  el.innerHTML = sessionHistory.map(function(item) {
    var savedLines = [];
    if (item.leadId) savedLines.push('已保存线索：' + item.leadId);
    if (item.opportunityId) savedLines.push('已保存商机：' + item.opportunityId);
    var title = item.unitName || item.customerName || 'AI 智能录入';
    return '<div class="history-item">' +
      '<div class="history-title">' + CRMApp.escapeHtml(title) + '</div>' +
      '<div class="history-meta">' + CRMApp.escapeHtml(savedLines.join('；') || '未返回保存ID') + '<br>保存时间：' + CRMApp.escapeHtml(item.time) + '</div>' +
      '</div>';
  }).join('');
}

if (currentUser) {
  setUserInfo();
  setRealtimeState('idle');
  renderHistory();
}

window.addEventListener('beforeunload', function() {
  if (realtimeClient) realtimeClient.destroy();
});
</script>
