<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>修改密码 - SalesPilot CRM</title>
  <style>
    :root{
      --bg:#eef4fb;
      --surface:rgba(255,255,255,.9);
      --primary:#0f766e;
      --primary-dark:#115e59;
      --text:#0f172a;
      --muted:#64748b;
      --border:#d8e3ef;
      --danger:#dc2626;
      --success:#16a34a;
      --shadow:0 28px 64px rgba(15,23,42,.16);
      --radius:24px;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      min-height:100vh;
      font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(15,118,110,.15), transparent 32%),
        radial-gradient(circle at bottom right, rgba(217,119,6,.14), transparent 28%),
        linear-gradient(160deg,#eef4fb 0%,#f8fafc 52%,#edf6f3 100%);
    }

    .page{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px 18px;
    }

    .panel{
      width:min(980px,100%);
      overflow:hidden;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      background:var(--surface);
      border:1px solid rgba(255,255,255,.7);
      backdrop-filter:blur(16px);
    }

    .hero{
      position:relative;
      padding:44px 38px;
      color:#fff;
      background:
        linear-gradient(145deg, rgba(15,118,110,.98), rgba(17,94,89,.9)),
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,0));
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-72px;
      bottom:-72px;
      width:230px;
      height:230px;
      border-radius:50%;
      background:rgba(255,255,255,.08);
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.14);
      font-size:13px;
      letter-spacing:.04em;
    }

    .hero h1{
      margin-top:24px;
      font-size:34px;
      line-height:1.18;
    }

    .hero p{
      margin-top:16px;
      max-width:430px;
      font-size:15px;
      line-height:1.72;
      color:rgba(255,255,255,.88);
    }

    .form-wrap{
      padding:44px 36px;
      background:rgba(255,255,255,.95);
    }

    .form-head h2{
      font-size:28px;
    }

    .form-head p{
      margin-top:10px;
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
    }

    .error{
      display:none;
      margin:0 0 16px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(220,38,38,.16);
      background:rgba(220,38,38,.08);
      color:var(--danger);
      font-size:13px;
      line-height:1.6;
    }

    .success{
      display:none;
      margin:0 0 16px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(22,163,74,.16);
      background:rgba(22,163,74,.08);
      color:var(--success);
      font-size:13px;
      line-height:1.6;
    }

    form{margin-top:28px}

    .field{margin-bottom:18px}

    .label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      font-weight:600;
      color:#334155;
    }

    .input{
      width:100%;
      padding:14px 16px;
      border:1px solid var(--border);
      border-radius:14px;
      background:#fff;
      color:var(--text);
      font-size:15px;
      transition:border-color .2s ease, box-shadow .2s ease;
    }

    .input:focus{
      outline:none;
      border-color:rgba(15,118,110,.6);
      box-shadow:0 0 0 4px rgba(15,118,110,.12);
    }

    .input.error{
      border-color:var(--danger);
    }

    .password-strength{
      margin-top:8px;
      padding:8px 12px;
      border-radius:10px;
      font-size:12px;
      font-weight:600;
      display:none;
    }

    .password-strength.weak{
      background:rgba(239,68,68,.1);
      color:#dc2626;
      border:1px solid rgba(239,68,68,.2);
      display:block;
    }

    .password-strength.medium{
      background:rgba(245,158,11,.1);
      color:#d97706;
      border:1px solid rgba(245,158,11,.2);
      display:block;
    }

    .password-strength.strong{
      background:rgba(16,185,129,.1);
      color:#059669;
      border:1px solid rgba(16,185,129,.2);
      display:block;
    }

    .password-requirements{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
    }

    .password-requirements ul{
      padding-left:16px;
      margin-top:4px;
    }

    .password-requirements li{
      margin-bottom:2px;
    }

    .password-requirements li.met{
      color:var(--success);
    }

    .submit{
      width:100%;
      padding:14px 18px;
      border:none;
      border-radius:14px;
      font-size:15px;
      font-weight:700;
      color:#fff;
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      box-shadow:0 14px 28px rgba(15,118,110,.24);
      cursor:pointer;
      transition:transform .2s ease, box-shadow .2s ease, opacity .2s ease;
    }

    .submit:hover:not(:disabled){
      transform:translateY(-1px);
      box-shadow:0 18px 30px rgba(15,118,110,.28);
    }

    .submit:disabled{
      opacity:.78;
      cursor:wait;
    }

    .footer{
      margin-top:18px;
      text-align:center;
      color:var(--muted);
      font-size:13px;
      line-height:1.7;
    }

    .footer a{
      color:var(--primary-dark);
      text-decoration:none;
      font-weight:600;
    }

    .footer a:hover{
      text-decoration:underline;
    }

    .back-btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-top:18px;
      padding:8px 12px;
      border-radius:12px;
      background:#e0f2fe;
      color:var(--primary-dark);
      text-decoration:none;
      font-weight:600;
      transition:background .2s ease;
    }

    .back-btn:hover{
      background:#bae6fd;
    }

    @media (max-width:860px){
      .panel{margin:16px}
      .hero,.form-wrap{padding:32px 24px}
      .hero h1{font-size:28px}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <section class="hero">
        <h1>修改密码</h1>
        <p>
          为了您的账户安全，请设置一个强密码。密码长度至少8位，建议包含字母、数字和特殊字符。
        </p>
      </section>

      <section class="form-wrap">
        <div class="form-head">
          <h2>修改密码</h2>
          <p>请输入当前密码和新的密码进行修改。</p>
        </div>

        <div class="error" id="error-box"></div>
        <div class="success" id="success-box"></div>

        <form id="password-form">
          <div class="field">
            <label class="label" for="current-password">当前密码</label>
            <input class="input" id="current-password" type="password" autocomplete="current-password" placeholder="请输入当前密码" required />
          </div>

          <div class="field">
            <label class="label" for="new-password">新密码</label>
            <input class="input" id="new-password" type="password" autocomplete="new-password" placeholder="请输入新密码" required />
            <div class="password-strength" id="password-strength"></div>
            <div class="password-requirements">
              <strong>密码要求：</strong>
              <ul>
                <li id="length-req" class="req">至少8个字符</li>
                <li id="uppercase-req" class="req">包含大写字母</li>
                <li id="lowercase-req" class="req">包含小写字母</li>
                <li id="number-req" class="req">包含数字</li>
                <li id="special-req" class="req">包含特殊字符</li>
              </ul>
            </div>
          </div>

          <div class="field">
            <label class="label" for="confirm-password">确认新密码</label>
            <input class="input" id="confirm-password" type="password" autocomplete="new-password" placeholder="请再次输入新密码" required />
          </div>

          <button class="submit" type="submit" id="submit-btn">修改密码</button>
        </form>

        <div class="footer">
          <div class="back-btn" onclick="goBack()">
            ← 返回 CRM 系统
          </div>
        </div>
      </section>
    </div>
  </div>

<script src="crm-common.js"></script>
<script>
  // 检查认证状态
  var currentUser = CRMApp.requireAuth();
  if (!currentUser) {
    CRMApp.redirectToLogin();
  }

  // 显示错误信息
  function showError(message) {
    var box = document.getElementById('error-box');
    box.textContent = message;
    box.style.display = 'block';
    document.getElementById('success-box').style.display = 'none';
  }

  // 显示成功信息
  function showSuccess(message) {
    var box = document.getElementById('success-box');
    box.textContent = message;
    box.style.display = 'block';
    document.getElementById('error-box').style.display = 'none';
  }

  // 清除所有消息
  function clearMessages() {
    document.getElementById('error-box').style.display = 'none';
    document.getElementById('success-box').style.display = 'none';
  }

  // 显示密码强度
  function showPasswordStrength(password) {
    var strengthEl = document.getElementById('password-strength');
    var lengthReq = document.getElementById('length-req');
    var uppercaseReq = document.getElementById('uppercase-req');
    var lowercaseReq = document.getElementById('lowercase-req');
    var numberReq = document.getElementById('number-req');
    var specialReq = document.getElementById('special-req');
    
    // 重置所有要求状态
    lengthReq.classList.remove('met');
    uppercaseReq.classList.remove('met');
    lowercaseReq.classList.remove('met');
    numberReq.classList.remove('met');
    specialReq.classList.remove('met');
    
    var score = 0;
    
    // 检查长度
    if (password.length >= 8) {
      score++;
      lengthReq.classList.add('met');
    }
    
    // 检查大写字母
    if (/[A-Z]/.test(password)) {
      score++;
      uppercaseReq.classList.add('met');
    }
    
    // 检查小写字母
    if (/[a-z]/.test(password)) {
      score++;
      lowercaseReq.classList.add('met');
    }
    
    // 检查数字
    if (/[0-9]/.test(password)) {
      score++;
      numberReq.classList.add('met');
    }
    
    // 检查特殊字符
    if (/[^A-Za-z0-9]/.test(password)) {
      score++;
      specialReq.classList.add('met');
    }
    
    // 显示强度
    strengthEl.className = 'password-strength';
    if (score >= 5) {
      strengthEl.classList.add('strong');
      strengthEl.textContent = '密码强度：强';
    } else if (score >= 3) {
      strengthEl.classList.add('medium');
      strengthEl.textContent = '密码强度：中';
    } else if (score >= 1) {
      strengthEl.classList.add('weak');
      strengthEl.textContent = '密码强度：弱';
    } else if (password.length > 0) {
      strengthEl.classList.add('weak');
      strengthEl.textContent = '密码强度：弱';
    }
  }

  // 清除输入框的错误状态
  function clearInputError(input) {
    input.classList.remove('error');
  }

  // 修改密码API调用
  async function changePassword(currentPassword, newPassword) {
    return await CRMApp.apiRequest('/api/auth/change-password', {
      method: 'POST',
      body: {
        current_password: currentPassword,
        new_password: newPassword,
        confirm_password: newPassword
      }
    });
  }

  // 表单提交处理
  document.getElementById('password-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    clearMessages();

    var currentPasswordEl = document.getElementById('current-password');
    var newPasswordEl = document.getElementById('new-password');
    var confirmPasswordEl = document.getElementById('confirm-password');
    var submitBtn = document.getElementById('submit-btn');

    var currentPassword = currentPasswordEl.value.trim();
    var newPassword = newPasswordEl.value.trim();
    var confirmPassword = confirmPasswordEl.value.trim();

    // 清除所有输入框的错误状态
    clearInputError(currentPasswordEl);
    clearInputError(newPasswordEl);
    clearInputError(confirmPasswordEl);

    // 验证
    if (!currentPassword || !newPassword || !confirmPassword) {
      showError('请填写所有密码字段。');
      return;
    }

    if (newPassword !== confirmPassword) {
      showError('两次输入的新密码不一致。');
      confirmPasswordEl.classList.add('error');
      return;
    }

    if (newPassword.length < 8) {
      showError('新密码长度至少需要8个字符。');
      newPasswordEl.classList.add('error');
      return;
    }

    if (currentPassword === newPassword) {
      showError('新密码不能与当前密码相同。');
      newPasswordEl.classList.add('error');
      return;
    }

    // 提交
    submitBtn.disabled = true;
    submitBtn.textContent = '修改中...';

    try {
      await changePassword(currentPassword, newPassword);
      showSuccess('密码修改成功！正在跳转到登录页面...');
      
      // 清除认证状态
      setTimeout(function() {
        CRMApp.clearAuth();
        CRMApp.redirectToLogin();
      }, 2000);
      
    } catch (error) {
      showError(error.message || '密码修改失败，请稍后重试。');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = '修改密码';
    }
  });

  // 实时密码强度检测
  document.getElementById('new-password').addEventListener('input', function(e) {
    var password = e.target.value;
    showPasswordStrength(password);
  });

  // 确认密码实时验证
  document.getElementById('confirm-password').addEventListener('input', function(e) {
    var newPassword = document.getElementById('new-password').value;
    var confirmPassword = e.target.value;
    
    if (confirmPassword.length > 0 && confirmPassword !== newPassword) {
      e.target.classList.add('error');
    } else {
      e.target.classList.remove('error');
    }
  });

  // 清除错误信息
  document.querySelectorAll('.input').forEach(function(input) {
    input.addEventListener('input', function() {
      clearInputError(this);
      clearMessages();
    });
  });

  // 返回按钮
  function goBack() {
    window.location.href = 'crm-system.html';
  }
</script>
</body>
</html>
