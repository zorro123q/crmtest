<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户管理 - SalesPilot CRM</title>
<style>
:root{
  --primary:#0EA5E9; --primary-dark:#0284C7; --primary-light:#E0F2FE;
  --bg:#F1F5F9; --surface:#FFFFFF; --border:#E2E8F0;
  --text:#1E293B; --text2:#64748B; --text3:#94A3B8;
  --success:#10B981; --danger:#EF4444; --warning:#F59E0B;
  --shadow:0 1px 3px rgba(15,23,42,0.08); --radius:12px
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* Header */
.header{background:linear-gradient(135deg,#0EA5E9,#6366F1);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
.header-actions{display:flex;gap:12px;align-items:center}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-white{background:rgba(255,255,255,0.2);color:#fff;backdrop-filter:blur(8px)}
.btn-white:hover{background:rgba(255,255,255,0.35)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{opacity:0.85}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{opacity:0.85}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:var(--bg)}
.btn-sm{padding:6px 12px;font-size:12px}

/* Container */
.container{max-width:1200px;margin:24px auto;padding:0 16px}

/* Stats Bar */
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.stat-value{font-size:28px;font-weight:700;color:var(--primary)}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px}

/* User Table */
.table-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.table-header{padding:20px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.table-header h2{font-size:18px;font-weight:700}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:var(--bg);padding:12px 16px;text-align:left;font-size:13px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.03em}
td{padding:14px 16px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
tr:hover td{background:#F8FAFC}
.user-cell{display:flex;align-items:center;gap:12px}
.user-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.avatar-admin{background:linear-gradient(135deg,#F59E0B,#D97706)}
.avatar-manager{background:linear-gradient(135deg,#8B5CF6,#6D28D9)}
.avatar-sales{background:linear-gradient(135deg,#10B981,#059669)}
.user-info .name{font-weight:600}
.user-info .email{font-size:12px;color:var(--text2)}

/* Badges */
.badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-admin{background:#FEF3C7;color:#92400E}
.badge-manager{background:#EDE9FE;color:#6D28D9}
.badge-sales{background:#D1FAE5;color:#065F46}
.badge-active{background:#D1FAE5;color:#065F46}
.badge-inactive{background:#FEE2E2;color:#991B1B}

/* Action Buttons */
.actions{display:flex;gap:6px;flex-wrap:wrap}
.action-btn{width:32px;height:32px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s}
.action-btn:hover{transform:scale(1.1)}
.action-edit{background:#E0F2FE;color:#0284C7}
.action-perm{background:#FEF3C7;color:#D97706}
.action-password{background:#EDE9FE;color:#6D28D9}
.action-toggle{background:#D1FAE5;color:#059669}
.action-toggle.disabled{background:#FEE2E2;color:#DC2626}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:18px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:8px;border:none;background:var(--bg);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--border)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:12px}

/* Form */
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px}
.form-group input,.form-group select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(14,165,233,0.1)}

/* Permission Grid */
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.perm-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1px solid var(--border);transition:all .2s;cursor:pointer}
.perm-item:hover{border-color:var(--primary);background:var(--primary-light)}
.perm-item input[type="checkbox"]{width:18px;height:18px;accent-color:var(--primary)}
.perm-item .perm-icon{font-size:18px}
.perm-item .perm-name{font-size:13px;font-weight:600}
.perm-item.checked{border-color:var(--primary);background:var(--primary-light)}

/* Toast */
.toast{position:fixed;top:20px;right:20px;padding:14px 20px;border-radius:10px;color:#fff;font-size:14px;font-weight:600;z-index:2000;transform:translateX(120%);transition:transform .3s ease;box-shadow:0 10px 30px rgba(0,0,0,0.15)}
.toast.show{transform:translateX(0)}
.toast-success{background:var(--success)}
.toast-error{background:var(--danger)}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--text2)}
.loading .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Responsive */
@media(max-width:768px){
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .perm-grid{grid-template-columns:1fr}
  .actions{flex-direction:column}
  .table-wrap{font-size:13px}
  th,td{padding:10px 8px}
}
</style>
</head>
<body>

<div class="header">
  <h1>👥 用户管理</h1>
  <div class="header-actions">
    <button class="btn btn-white" onclick="backToCRM()">← 返回主页</button>
    <button class="btn btn-white" onclick="openCreateModal()">+ 新建用户</button>
  </div>
</div>

<div class="container">
  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-value" id="stat-total">-</div>
      <div class="stat-label">总用户数</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-active">-</div>
      <div class="stat-label">活跃用户</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-admin">-</div>
      <div class="stat-label">管理员</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-sales">-</div>
      <div class="stat-label">销售</div>
    </div>
  </div>

  <!-- User Table -->
  <div class="table-card">
    <div class="table-header">
      <h2>用户列表</h2>
      <button class="btn btn-outline btn-sm" onclick="loadUsers()">🔄 刷新</button>
    </div>
    <div class="table-wrap">
      <div class="loading" id="loading"><div class="spinner"></div>加载中...</div>
      <table id="user-table" style="display:none">
        <thead>
          <tr>
            <th>用户</th>
            <th>角色</th>
            <th>状态</th>
            <th>权限范围</th>
            <th>创建时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="user-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Create/Edit User Modal -->
<div class="modal-overlay" id="user-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">新建用户</h3>
      <button class="modal-close" onclick="closeModal('user-modal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-user-id">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="modal-username" placeholder="输入用户名">
      </div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="modal-email" placeholder="输入邮箱">
      </div>
      <div class="form-group" id="password-group">
        <label>密码</label>
        <input type="text" id="modal-password" placeholder="输入初始密码">
      </div>
      <div class="form-group">
        <label>角色</label>
        <select id="modal-role" onchange="onRoleChange()">
          <option value="sales">销售 (基础权限)</option>
          <option value="manager">经理 (全部权限，除用户管理)</option>
          <option value="admin">管理员 (全部权限)</option>
        </select>
      </div>
      <div class="form-group">
        <label>模块权限 <span style="color:var(--text3);font-weight:400">(切换开关控制用户可看到的页面)</span></label>
        <div class="perm-grid" id="perm-grid"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('user-modal')">取消</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveUser()">创建用户</button>
    </div>
  </div>
</div>

<!-- Reset Password Modal -->
<div class="modal-overlay" id="pwd-modal">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <h3>重置密码</h3>
      <button class="modal-close" onclick="closeModal('pwd-modal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="pwd-user-id">
      <p style="margin-bottom:12px;color:var(--text2);font-size:14px">为用户 <strong id="pwd-username"></strong> 设置新密码：</p>
      <div class="form-group">
        <label>新密码</label>
        <input type="text" id="new-password" placeholder="输入新密码">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('pwd-modal')">取消</button>
      <button class="btn btn-primary" onclick="resetPassword()">确认重置</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
var API_BASE = getApiBase();
var currentUser = null;
var allUsers = [];
var permissionModules = [];
var currentPermissions = {};

function getApiBase() {
  var saved = localStorage.getItem('crm_api_base');
  if (saved) return saved.replace(/\/$/, '');
  return 'http://127.0.0.1:8000';
}

function getToken() {
  return localStorage.getItem('crm_token');
}

function backToCRM() {
  window.location.href = 'crm-system.html';
}

// Check admin on load
document.addEventListener('DOMContentLoaded', function() {
  var userStr = localStorage.getItem('crm_user');
  if (!userStr) { window.location.href = 'login.html'; return; }
  currentUser = JSON.parse(userStr);
  if (currentUser.role !== 'admin') {
    alert('只有管理员可以访问此页面');
    window.location.href = 'crm-system.html';
    return;
  }
  loadPermissionModules();
  loadUsers();
});

function showToast(msg, type) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast toast-' + type + ' show';
  setTimeout(function() { toast.className = 'toast'; }, 3000);
}

async function apiCall(method, url, body) {
  var opts = {
    method: method,
    headers: {
      'Authorization': 'Bearer ' + getToken(),
      'Content-Type': 'application/json'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  var resp = await fetch(API_BASE + url, opts);
  if (!resp.ok) {
    var err = await resp.json().catch(function() { return {}; });
    throw new Error(err.detail || '请求失败');
  }
  if (resp.status === 204) return null;
  return resp.json();
}

// Load permission module list
async function loadPermissionModules() {
  try {
    var data = await apiCall('GET', '/api/admin/permissions/modules');
    permissionModules = data.modules || [];
  } catch(e) {
    // fallback defaults
    permissionModules = [
      {key:'dashboard',name:'销售仪表盘',icon:'📊'},
      {key:'funnel',name:'商机漏斗',icon:'🔻'},
      {key:'kanban',name:'商机看板',icon:'🗂️'},
      {key:'leads',name:'线索管理',icon:'👥'},
      {key:'opportunities',name:'商机列表',icon:'💼'},
      {key:'report',name:'商机通报',icon:'📋'},
      {key:'ai_input',name:'AI 智能录入',icon:'🤖'},
      {key:'card_input',name:'价值评估',icon:'🎯'},
      {key:'user_management',name:'用户管理',icon:'⚙️'}
    ];
  }
}

// Load all users
async function loadUsers() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('user-table').style.display = 'none';
  try {
    allUsers = await apiCall('GET', '/api/admin/users');
    renderUsers();
    updateStats();
  } catch(e) {
    showToast('加载用户列表失败: ' + e.message, 'error');
  }
  document.getElementById('loading').style.display = 'none';
  document.getElementById('user-table').style.display = 'table';
}

function updateStats() {
  document.getElementById('stat-total').textContent = allUsers.length;
  document.getElementById('stat-active').textContent = allUsers.filter(function(u){return u.is_active;}).length;
  document.getElementById('stat-admin').textContent = allUsers.filter(function(u){return u.role==='admin';}).length;
  document.getElementById('stat-sales').textContent = allUsers.filter(function(u){return u.role==='sales';}).length;
}

function getRoleLabel(role) {
  var map = {admin:'管理员',manager:'经理',sales:'销售'};
  return map[role] || role;
}

function getAvatarClass(role) {
  var map = {admin:'avatar-admin',manager:'avatar-manager',sales:'avatar-sales'};
  return map[role] || 'avatar-sales';
}

function getBadgeClass(role) {
  var map = {admin:'badge-admin',manager:'badge-manager',sales:'badge-sales'};
  return map[role] || '';
}

function permSummary(perms) {
  if (!perms) return '角色默认';
  var count = 0;
  var total = 0;
  for (var k in perms) { total++; if (perms[k]) count++; }
  if (count === total) return '全部权限';
  if (count === 0) return '无权限';
  return count + '/' + total + ' 模块';
}

function renderUsers() {
  var tbody = document.getElementById('user-tbody');
  var html = '';
  for (var i = 0; i < allUsers.length; i++) {
    var u = allUsers[i];
    var initial = (u.username || '?').charAt(0);
    var created = u.created_at ? new Date(u.created_at).toLocaleDateString('zh-CN') : '-';
    var isMe = (u.id === currentUser.id);
    html += '<tr>' +
      '<td><div class="user-cell">' +
        '<div class="user-avatar ' + getAvatarClass(u.role) + '">' + initial + '</div>' +
        '<div class="user-info"><div class="name">' + escHtml(u.username) + (isMe ? ' <span style="color:var(--primary);font-size:11px">(我)</span>' : '') + '</div>' +
        '<div class="email">' + escHtml(u.email) + '</div></div>' +
      '</div></td>' +
      '<td><span class="badge ' + getBadgeClass(u.role) + '">' + getRoleLabel(u.role) + '</span></td>' +
      '<td><span class="badge ' + (u.is_active ? 'badge-active' : 'badge-inactive') + '">' + (u.is_active ? '活跃' : '禁用') + '</span></td>' +
      '<td>' + permSummary(u.permissions) + '</td>' +
      '<td style="color:var(--text2);font-size:13px">' + created + '</td>' +
      '<td><div class="actions">' +
        '<button class="action-btn action-edit" title="编辑用户" onclick="openEditModal(\'' + u.id + '\')">✏️</button>' +
        '<button class="action-btn action-perm" title="设置权限" onclick="openPermModal(\'' + u.id + '\')">🔑</button>' +
        '<button class="action-btn action-password" title="重置密码" onclick="openPwdModal(\'' + u.id + '\',\'' + escHtml(u.username) + '\')">🔒</button>' +
        '<button class="action-btn action-toggle' + (u.is_active ? '' : ' disabled') + '" title="' + (u.is_active ? '禁用' : '启用') + '" onclick="toggleUser(\'' + u.id + '\')">' + (u.is_active ? '⏸️' : '▶️') + '</button>' +
      '</div></td>' +
    '</tr>';
  }
  tbody.innerHTML = html;
}

function escHtml(str) {
  var div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// Open create modal
function openCreateModal() {
  document.getElementById('modal-title').textContent = '新建用户';
  document.getElementById('edit-user-id').value = '';
  document.getElementById('modal-username').value = '';
  document.getElementById('modal-email').value = '';
  document.getElementById('modal-password').value = '';
  document.getElementById('modal-role').value = 'sales';
  document.getElementById('password-group').style.display = 'block';
  document.getElementById('modal-save-btn').textContent = '创建用户';
  currentPermissions = {};
  onRoleChange();
  openModal('user-modal');
}

// Open edit modal
function openEditModal(userId) {
  var user = allUsers.find(function(u){ return u.id === userId; });
  if (!user) return;
  document.getElementById('modal-title').textContent = '编辑用户';
  document.getElementById('edit-user-id').value = userId;
  document.getElementById('modal-username').value = user.username;
  document.getElementById('modal-email').value = user.email;
  document.getElementById('modal-role').value = user.role;
  document.getElementById('password-group').style.display = 'none';
  document.getElementById('modal-save-btn').textContent = '保存修改';
  currentPermissions = user.permissions || {};
  renderPermGrid();
  openModal('user-modal');
}

// Open permission-only modal
function openPermModal(userId) {
  openEditModal(userId);
}

// Role change -> reset permissions to defaults
function onRoleChange() {
  var role = document.getElementById('modal-role').value;
  var defaults = {
    admin: {},
    manager: {},
    sales: {dashboard:true,funnel:true,kanban:true,leads:true,opportunities:true,report:false,ai_input:true,card_input:false,user_management:false}
  };
  currentPermissions = defaults[role] || {};
  renderPermGrid();
}

function renderPermGrid() {
  var grid = document.getElementById('perm-grid');
  var html = '';
  for (var i = 0; i < permissionModules.length; i++) {
    var m = permissionModules[i];
    var checked = currentPermissions.hasOwnProperty(m.key) ? currentPermissions[m.key] : true;
    var cls = checked ? 'perm-item checked' : 'perm-item';
    html += '<label class="' + cls + '">' +
      '<input type="checkbox" data-key="' + m.key + '" ' + (checked ? 'checked' : '') + ' onchange="onPermChange(this)">' +
      '<span class="perm-icon">' + m.icon + '</span>' +
      '<span class="perm-name">' + m.name + '</span>' +
    '</label>';
  }
  grid.innerHTML = html;
}

function onPermChange(el) {
  var key = el.getAttribute('data-key');
  currentPermissions[key] = el.checked;
  el.parentElement.className = el.checked ? 'perm-item checked' : 'perm-item';
}

// Save user (create or update)
async function saveUser() {
  var editId = document.getElementById('edit-user-id').value;
  var username = document.getElementById('modal-username').value.trim();
  var email = document.getElementById('modal-email').value.trim();
  var password = document.getElementById('modal-password').value;
  var role = document.getElementById('modal-role').value;

  if (!username || !email) { showToast('请填写用户名和邮箱', 'error'); return; }
  if (!editId && !password) { showToast('请设置初始密码', 'error'); return; }

  try {
    if (editId) {
      // Update
      var updateData = { email: email, role: role, permissions: currentPermissions };
      await apiCall('PUT', '/api/admin/users/' + editId, updateData);
      showToast('用户信息已更新', 'success');
    } else {
      // Create
      var createData = { username: username, email: email, password: password, role: role, permissions: currentPermissions };
      await apiCall('POST', '/api/admin/users', createData);
      showToast('用户创建成功', 'success');
    }
    closeModal('user-modal');
    loadUsers();
  } catch(e) {
    showToast('操作失败: ' + e.message, 'error');
  }
}

// Toggle user active
async function toggleUser(userId) {
  var user = allUsers.find(function(u){ return u.id === userId; });
  if (!user) return;
  var action = user.is_active ? '禁用' : '启用';
  if (!confirm('确定要' + action + '用户 ' + user.username + ' 吗？')) return;
  try {
    await apiCall('PATCH', '/api/admin/users/' + userId + '/toggle');
    showToast('已' + action + '用户', 'success');
    loadUsers();
  } catch(e) {
    showToast('操作失败: ' + e.message, 'error');
  }
}

// Reset password modal
function openPwdModal(userId, username) {
  document.getElementById('pwd-user-id').value = userId;
  document.getElementById('pwd-username').textContent = username;
  document.getElementById('new-password').value = '';
  openModal('pwd-modal');
}

async function resetPassword() {
  var userId = document.getElementById('pwd-user-id').value;
  var newPwd = document.getElementById('new-password').value;
  if (!newPwd) { showToast('请输入新密码', 'error'); return; }
  try {
    await apiCall('POST', '/api/admin/users/' + userId + '/reset-password', { new_password: newPwd });
    showToast('密码已重置', 'success');
    closeModal('pwd-modal');
  } catch(e) {
    showToast('重置失败: ' + e.message, 'error');
  }
}

// Modal helpers
function openModal(id) {
  document.getElementById(id).classList.add('active');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) overlay.classList.remove('active');
  });
});
</script>
