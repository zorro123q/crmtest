<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>线索管理 - SalesPilot CRM</title>
<style>
:root{
  --primary:#0EA5E9;
  --primary-dark:#0284C7;
  --primary-light:#E0F2FE;
  --success:#10B981;
  --warning:#F59E0B;
  --danger:#EF4444;
  --bg:#F1F5F9;
  --surface:#FFFFFF;
  --border:#E2E8F0;
  --text:#1E293B;
  --text2:#64748B;
  --text3:#94A3B8;
  --shadow:0 1px 3px rgba(15,23,42,.08),0 10px 22px rgba(15,23,42,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
.sidebar{width:236px;background:linear-gradient(180deg,#0F172A 0%,#1E3A5F 55%,#0F172A 100%);color:#CBD5E1;padding:22px 0}
.logo{padding:0 20px 22px;border-bottom:1px solid rgba(255,255,255,.08)}
.logo-title{font-size:22px;font-weight:800;color:#fff}
.logo-sub{font-size:12px;color:#94A3B8;margin-top:6px}
.nav{padding:16px 12px 0}
.nav a{display:flex;align-items:center;gap:10px;color:#94A3B8;text-decoration:none;padding:11px 12px;border-radius:12px;font-size:14px;margin-bottom:6px}
.nav a:hover,.nav a.active{background:rgba(14,165,233,.14);color:#fff}
.main{flex:1;display:flex;flex-direction:column}
.topbar{background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:18px 24px;display:flex;justify-content:space-between;align-items:flex-start;gap:20px;position:sticky;top:0;z-index:10}
.topbar h1{font-size:24px;font-weight:800}
.topbar p{font-size:13px;color:var(--text2);margin-top:6px}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.search{padding:10px 14px;border:1px solid var(--border);border-radius:12px;background:#fff;width:240px;font-size:14px}
.search:focus{outline:none;border-color:#7DD3FC;box-shadow:0 0 0 3px rgba(14,165,233,.12)}
.btn{border:none;border-radius:12px;padding:10px 14px;font-size:14px;font-weight:700;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,var(--primary),#2563EB);color:#fff}
.btn-ghost{background:#fff;border:1px solid var(--border);color:var(--text)}
.avatar{width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,var(--primary),#2563EB);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800}
.content{padding:24px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:var(--shadow)}
.stat-label{font-size:12px;color:var(--text3)}
.stat-value{font-size:28px;font-weight:800;margin-top:8px}
.stat-hint{font-size:12px;color:var(--text2);margin-top:8px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);overflow:hidden}
.panel-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:16px}
.panel-head h2{font-size:18px;font-weight:800}
.panel-head span{font-size:13px;color:var(--text2)}
.table-wrap{overflow:auto}
table{width:100%;border-collapse:collapse;min-width:1080px}
th,td{padding:14px 16px;border-bottom:1px solid var(--border);text-align:left;font-size:13px;vertical-align:middle}
th{background:#F8FAFC;color:var(--text2);font-size:12px;font-weight:800}
tbody tr:hover{background:#FAFCFF}
.pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700}
.pill-blue{background:#EFF6FF;color:#1D4ED8}
.pill-green{background:#ECFDF5;color:#047857}
.pill-orange{background:#FFF7ED;color:#C2410C}
.pill-red{background:#FEF2F2;color:#B91C1C}
.action-btn{border:none;border-radius:10px;padding:8px 12px;cursor:pointer;font-size:12px;font-weight:700}
.action-edit{background:#E0F2FE;color:#0369A1}
.action-view{background:#F1F5F9;color:#475569}
.empty{padding:36px 20px;text-align:center;color:var(--text2)}
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;padding:20px;z-index:30}
.modal-overlay.active{display:flex}
.modal{width:min(760px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:22px;box-shadow:0 24px 70px rgba(15,23,42,.25)}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:20px;font-weight:800}
.modal-close{border:none;background:#F1F5F9;border-radius:10px;width:36px;height:36px;cursor:pointer;font-size:20px}
.modal-body{padding:22px}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:700;color:var(--text2);margin-bottom:8px}
.input,.select,.textarea{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:12px;font-size:14px;background:#fff}
.textarea{min-height:100px;resize:vertical}
.input:focus,.select:focus,.textarea:focus{outline:none;border-color:#7DD3FC;box-shadow:0 0 0 3px rgba(14,165,233,.12)}
.readonly{background:#F8FAFC;color:#64748B}
.modal-foot{padding:18px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
@media (max-width:1080px){.stats{grid-template-columns:repeat(2,1fr)}}
@media (max-width:860px){
  body{display:block}
  .sidebar{width:100%;padding:14px}
  .nav{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:16px 0 0}
  .nav a{margin:0}
  .topbar{position:static;flex-direction:column;align-items:flex-start}
  .toolbar{justify-content:flex-start}
  .search{width:100%}
  .stats{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-title">SalesPilot</div>
      <div class="logo-sub">共享线索池 / 按归属编辑</div>
    </div>
    <nav class="nav">
      <a href="crm-system.html">🏠 工作台</a>
      <a href="page-dashboard.html">📊 销售仪表盘</a>
      <a href="page-funnel.html">🔻 商机漏斗</a>
      <a href="page-kanban.html">🗂️ 商机看板</a>
      <a href="page-leads.html" class="active">👥 线索管理</a>
      <a href="page-opportunities.html">💼 商机列表</a>
      <a href="page-report.html">📋 商机通报</a>
      <a href="ai-input.html">🤖 AI 智能录入</a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h1>线索管理</h1>
        <p>所有用户可以查看共享线索池。普通用户仅可编辑本人创建的线索，管理员可以修改全部线索并导出数据。</p>
      </div>
      <div class="toolbar">
        <input class="search" id="search-input" type="text" placeholder="搜索线索、公司、填报人">
        <button class="btn btn-ghost" id="export-btn" onclick="exportLeads()">导出数据</button>
        <button class="btn btn-primary" onclick="openCreateModal()">新建线索</button>
        <div class="avatar" id="user-avatar">U</div>
      </div>
    </div>

    <div class="content">
      <section class="stats">
        <div class="stat-card">
          <div class="stat-label">线索总数</div>
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-hint">共享线索池全部记录</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">我的线索</div>
          <div class="stat-value" id="stat-mine">0</div>
          <div class="stat-hint">当前账号本人创建</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">有效跟进</div>
          <div class="stat-value" id="stat-active">0</div>
          <div class="stat-hint">状态为跟进中或培育中</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">高优先级</div>
          <div class="stat-value" id="stat-a">0</div>
          <div class="stat-hint">等级为 A 的线索</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>共享线索数据</h2>
            <span>所有人可查看；只有本人和管理员能进入编辑模式</span>
          </div>
          <span id="result-count">0 条记录</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>线索名称</th>
                <th>公司名称</th>
                <th>行业</th>
                <th>客户类型</th>
                <th>等级</th>
                <th>预算</th>
                <th>来源</th>
                <th>状态</th>
                <th>填报人</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="lead-tbody"></tbody>
          </table>
          <div class="empty" id="empty-state" style="display:none">暂无线索数据</div>
        </div>
      </section>
    </div>
  </main>

  <div class="modal-overlay" id="lead-modal">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modal-title">新建线索</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group">
            <label for="lead-name">线索名称</label>
            <input class="input" id="lead-name" type="text" placeholder="请输入联系人或线索名称">
          </div>
          <div class="form-group">
            <label for="lead-company">公司名称</label>
            <input class="input" id="lead-company" type="text" placeholder="请输入公司名称">
          </div>
          <div class="form-group">
            <label for="lead-industry">行业</label>
            <input class="input" id="lead-industry" type="text" placeholder="如：金融、制造、政务">
          </div>
          <div class="form-group">
            <label for="lead-type">客户类型</label>
            <select class="select" id="lead-type">
              <option value="">请选择</option>
              <option value="老客户">老客户</option>
              <option value="老客户新部门">老客户新部门</option>
              <option value="新客户">新客户</option>
            </select>
          </div>
          <div class="form-group">
            <label for="lead-level">等级</label>
            <select class="select" id="lead-level">
              <option value="">请选择</option>
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
            </select>
          </div>
          <div class="form-group">
            <label for="lead-budget">预算</label>
            <input class="input" id="lead-budget" type="number" min="0" placeholder="请输入预算金额">
          </div>
          <div class="form-group">
            <label for="lead-source">线索来源</label>
            <select class="select" id="lead-source">
              <option value="">请选择</option>
              <option value="电话营销">电话营销</option>
              <option value="老客户转介绍">老客户转介绍</option>
              <option value="官网留资">官网留资</option>
              <option value="展会">展会</option>
              <option value="朋友推荐">朋友推荐</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="form-group">
            <label for="lead-status">状态</label>
            <select class="select" id="lead-status">
              <option value="New">新线索</option>
              <option value="Working">跟进中</option>
              <option value="Nurturing">培育中</option>
              <option value="Converted">已转商机</option>
              <option value="Disqualified">已作废</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="lead-demand">需求描述</label>
          <textarea class="textarea" id="lead-demand" placeholder="请输入客户需求、场景或补充说明"></textarea>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" id="save-btn" onclick="saveLead()">保存线索</button>
      </div>
    </div>
  </div>

<script src="crm-common.js"></script>
<script>
var currentUser = CRMApp.requireAuth('leads');
var leads = [];
var filteredLeads = [];
var editingLeadId = null;
var currentMode = 'create';

function normalizeLead(item) {
  var custom = item.custom_fields || {};
  return {
    id: item.id,
    ownerId: item.owner_id || (item.owner && item.owner.id) || '',
    ownerName: item.owner && item.owner.username ? item.owner.username : '未分配',
    name: item.name || '',
    company: item.company || '',
    industry: custom.industry || '',
    type: custom.customer_type || '',
    level: custom.level || '',
    budget: Number(custom.budget || 0),
    demand: custom.demand || '',
    source: item.source || '',
    status: item.status || 'New',
    raw: item
  };
}

function getLevelClass(level) {
  if (level === 'A') return 'pill pill-green';
  if (level === 'B') return 'pill pill-blue';
  return 'pill pill-orange';
}

function getStatusLabel(status) {
  var map = {
    New: '新线索',
    Working: '跟进中',
    Nurturing: '培育中',
    Converted: '已转商机',
    Disqualified: '已作废'
  };
  return map[status] || status;
}

function getStatusClass(status) {
  if (status === 'Converted') return 'pill pill-green';
  if (status === 'Disqualified') return 'pill pill-red';
  if (status === 'Working' || status === 'Nurturing') return 'pill pill-blue';
  return 'pill pill-orange';
}

function levelToScore(level) {
  return { A: 90, B: 70, C: 50 }[level] || 0;
}

async function loadLeads() {
  try {
    var response = await CRMApp.apiRequest('/api/leads');
    leads = (response || []).map(normalizeLead);
    applyFilter();
  } catch (error) {
    alert(error.message || '获取线索失败');
  }
}

function applyFilter() {
  var keyword = document.getElementById('search-input').value.trim().toLowerCase();
  filteredLeads = leads.filter(function(item) {
    if (!keyword) return true;
    return [
      item.name,
      item.company,
      item.industry,
      item.ownerName
    ].join(' ').toLowerCase().indexOf(keyword) >= 0;
  });
  renderStats();
  renderTable();
}

function renderStats() {
  var total = filteredLeads.length;
  var mine = filteredLeads.filter(function(item) { return String(item.ownerId) === String(currentUser.id); }).length;
  var activeCount = filteredLeads.filter(function(item) { return item.status === 'Working' || item.status === 'Nurturing'; }).length;
  var aCount = filteredLeads.filter(function(item) { return item.level === 'A'; }).length;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-mine').textContent = mine;
  document.getElementById('stat-active').textContent = activeCount;
  document.getElementById('stat-a').textContent = aCount;
  document.getElementById('result-count').textContent = total + ' 条记录';
}

function renderTable() {
  var tbody = document.getElementById('lead-tbody');
  var empty = document.getElementById('empty-state');

  if (!filteredLeads.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  tbody.innerHTML = filteredLeads.map(function(item) {
    var editable = CRMApp.canEditOwner(currentUser, item.ownerId);
    return '<tr>' +
      '<td><strong>' + CRMApp.escapeHtml(item.name || '-') + '</strong></td>' +
      '<td>' + CRMApp.escapeHtml(item.company || '-') + '</td>' +
      '<td>' + CRMApp.escapeHtml(item.industry || '-') + '</td>' +
      '<td>' + CRMApp.escapeHtml(item.type || '-') + '</td>' +
      '<td><span class="' + getLevelClass(item.level) + '">' + CRMApp.escapeHtml(item.level || '-') + '</span></td>' +
      '<td>¥' + (Number(item.budget) || 0).toLocaleString('zh-CN') + '</td>' +
      '<td>' + CRMApp.escapeHtml(item.source || '-') + '</td>' +
      '<td><span class="' + getStatusClass(item.status) + '">' + CRMApp.escapeHtml(getStatusLabel(item.status)) + '</span></td>' +
      '<td>' + CRMApp.escapeHtml(item.ownerName) + '</td>' +
      '<td><button class="action-btn ' + (editable ? 'action-edit' : 'action-view') + '" onclick="openDetailModal(\'' + item.id + '\')">' + (editable ? '编辑' : '只读查看') + '</button></td>' +
      '</tr>';
  }).join('');
}

function setUserUI() {
  document.getElementById('user-avatar').textContent = (currentUser.username || 'U').charAt(0).toUpperCase();
  document.getElementById('export-btn').style.display = CRMApp.isAdmin(currentUser) ? 'inline-flex' : 'none';
}

function openCreateModal() {
  currentMode = 'create';
  editingLeadId = null;
  document.getElementById('modal-title').textContent = '新建线索';
  document.getElementById('save-btn').textContent = '保存线索';
  fillForm(null, false);
  document.getElementById('lead-modal').classList.add('active');
}

function openDetailModal(id) {
  var item = leads.find(function(entry) { return entry.id === id; });
  if (!item) return;
  currentMode = 'edit';
  editingLeadId = id;
  var editable = CRMApp.canEditOwner(currentUser, item.ownerId);
  document.getElementById('modal-title').textContent = editable ? '编辑线索' : '查看线索';
  document.getElementById('save-btn').textContent = editable ? '保存修改' : '关闭';
  fillForm(item, !editable);
  document.getElementById('lead-modal').classList.add('active');
}

function fillForm(item, readOnly) {
  var values = item || {
    name: '',
    company: '',
    industry: '',
    type: '',
    level: '',
    budget: '',
    source: '',
    status: 'New',
    demand: ''
  };

  document.getElementById('lead-name').value = values.name || '';
  document.getElementById('lead-company').value = values.company || '';
  document.getElementById('lead-industry').value = values.industry || '';
  document.getElementById('lead-type').value = values.type || '';
  document.getElementById('lead-level').value = values.level || '';
  document.getElementById('lead-budget').value = values.budget || '';
  document.getElementById('lead-source').value = values.source || '';
  document.getElementById('lead-status').value = values.status || 'New';
  document.getElementById('lead-demand').value = values.demand || '';

  [
    'lead-name',
    'lead-company',
    'lead-industry',
    'lead-type',
    'lead-level',
    'lead-budget',
    'lead-source',
    'lead-status',
    'lead-demand'
  ].forEach(function(id) {
    var el = document.getElementById(id);
    el.disabled = !!readOnly;
    el.classList.toggle('readonly', !!readOnly);
  });
}

function closeModal() {
  document.getElementById('lead-modal').classList.remove('active');
}

function collectPayload() {
  var name = document.getElementById('lead-name').value.trim();
  var company = document.getElementById('lead-company').value.trim();
  if (!name || !company) {
    throw new Error('请先填写线索名称和公司名称');
  }

  var level = document.getElementById('lead-level').value;
  return {
    name: name,
    company: company,
    source: document.getElementById('lead-source').value,
    status: document.getElementById('lead-status').value || 'New',
    score: levelToScore(level),
    custom_fields: {
      industry: document.getElementById('lead-industry').value.trim(),
      customer_type: document.getElementById('lead-type').value,
      level: level,
      budget: Number(document.getElementById('lead-budget').value || 0),
      demand: document.getElementById('lead-demand').value.trim()
    }
  };
}

async function saveLead() {
  if (currentMode === 'edit') {
    var existing = leads.find(function(entry) { return entry.id === editingLeadId; });
    if (!existing || !CRMApp.canEditOwner(currentUser, existing.ownerId)) {
      closeModal();
      return;
    }
  }

  try {
    var payload = collectPayload();
    if (currentMode === 'create') {
      await CRMApp.apiRequest('/api/leads', { method: 'POST', body: payload });
    } else {
      await CRMApp.apiRequest('/api/leads/' + editingLeadId, { method: 'PATCH', body: payload });
    }
    closeModal();
    await loadLeads();
  } catch (error) {
    alert(error.message || '保存失败');
  }
}

function exportLeads() {
  if (!CRMApp.isAdmin(currentUser)) {
    alert('普通用户不能导出数据');
    return;
  }

  var rows = [
    ['线索名称','公司名称','行业','客户类型','等级','预算','来源','状态','填报人']
  ];

  leads.forEach(function(item) {
    rows.push([
      item.name,
      item.company,
      item.industry,
      item.type,
      item.level,
      item.budget,
      item.source,
      getStatusLabel(item.status),
      item.ownerName
    ]);
  });

  var content = '\uFEFF' + rows.map(function(row) {
    return row.map(function(cell) {
      var value = cell == null ? '' : String(cell);
      return '"' + value.replace(/"/g, '""') + '"';
    }).join(',');
  }).join('\n');

  var blob = new Blob([content], { type: 'text/csv;charset=utf-8' });
  var link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = '线索数据_' + new Date().toISOString().slice(0, 10) + '.csv';
  link.click();
}

document.getElementById('search-input').addEventListener('input', applyFilter);
document.getElementById('lead-modal').addEventListener('click', function(event) {
  if (event.target === this) closeModal();
});

if (currentUser) {
  setUserUI();
  loadLeads();
}
</script>
</body>
</html>
